<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STICKMAN BRAWL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#fff;user-select:none}
#title{font-family:'Black Ops One',cursive;font-size:2.4rem;letter-spacing:8px;color:#ff3300;text-shadow:0 0 20px #ff3300,0 0 50px #ff1100;margin-bottom:6px}
#subtitle{font-size:0.65rem;color:#444;letter-spacing:3px;margin-bottom:10px}
#hud{display:flex;width:800px;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px}
.health-wrap{display:flex;flex-direction:column;gap:3px;flex:1}
.health-wrap.right{align-items:flex-end}
.fighter-label{font-size:0.7rem;letter-spacing:3px;color:#888}
.hp-outer{width:100%;height:16px;background:#0a0a0a;border:1px solid #222;position:relative;overflow:hidden}
.hp-inner{height:100%;transition:width 0.12s linear;position:relative}
#p1hp{background:linear-gradient(90deg,#00ffcc,#0088ff);box-shadow:0 0 10px #00ffcc80}
#p2hp{background:linear-gradient(90deg,#ff2200,#ff8800);box-shadow:0 0 10px #ff220080}
#center-hud{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:110px}
#round-label{font-family:'Black Ops One',cursive;font-size:0.75rem;color:#333;letter-spacing:3px}
#timer-box{font-family:'Black Ops One',cursive;font-size:2rem;color:#ff3300;text-shadow:0 0 12px #ff3300;line-height:1}
#level-label{font-size:0.55rem;color:#444;letter-spacing:2px}
#game-wrap{position:relative;width:800px;height:360px;border:1px solid #1a1a1a;overflow:hidden}
canvas{position:absolute;top:0;left:0}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);z-index:20;gap:8px}
#overlay h2{font-family:'Black Ops One',cursive;font-size:3rem;color:#ff3300;text-shadow:0 0 30px #ff3300;letter-spacing:4px}
#overlay .sub{font-size:0.8rem;color:#555;letter-spacing:3px}
#overlay .win{font-size:0.9rem;color:#00ffcc;letter-spacing:2px}
.btn{background:none;border:2px solid #ff3300;color:#ff3300;padding:10px 40px;font-family:'Black Ops One',cursive;font-size:0.95rem;letter-spacing:3px;cursor:pointer;transition:all 0.2s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);margin-top:8px;display:block}
.btn:hover{background:#ff3300;color:#fff;box-shadow:0 0 20px #ff330060}
.btn.green{border-color:#00ffcc;color:#00ffcc}.btn.green:hover{background:#00ffcc;color:#000;box-shadow:0 0 20px #00ffcc60}
.keys-row{display:flex;gap:20px;margin-top:6px;font-size:0.6rem;color:#333;letter-spacing:1px}
.keys-row b{color:#00ffcc}
#combo-display{position:absolute;bottom:6px;left:8px;font-size:0.6rem;color:#555;letter-spacing:1px;z-index:5;font-family:'Black Ops One',cursive}
</style>
</head>
<body>
<div id="title">STICKMAN BRAWL</div>
<div id="subtitle">← → LAUFEN &nbsp;·&nbsp; ↑/W SPRINGEN &nbsp;·&nbsp; A SCHLAG &nbsp;·&nbsp; S KICK &nbsp;·&nbsp; D BLOCK</div>
<div id="hud">
  <div class="health-wrap">
    <div class="fighter-label">PLAYER</div>
    <div class="hp-outer"><div class="hp-inner" id="p1hp" style="width:100%"></div></div>
  </div>
  <div id="center-hud">
    <div id="round-label">LEVEL 1</div>
    <div id="timer-box">99</div>
    <div id="level-label">WAREHOUSE</div>
  </div>
  <div class="health-wrap right">
    <div class="fighter-label">BOT</div>
    <div class="hp-outer"><div class="hp-inner" id="p2hp" style="width:100%"></div></div>
  </div>
</div>
<div id="game-wrap">
  <canvas id="bg" width="800" height="360"></canvas>
  <canvas id="gc" width="800" height="360"></canvas>
  <div id="overlay">
    <h2>STICKMAN BRAWL</h2>
    <div class="sub">3 LEVELS · REALISTISCHER STICKMAN · BOT KI</div>
    <button class="btn green" onclick="startLevel(1)">KAMPF STARTEN</button>
    <div class="keys-row">
      <span>← → Laufen</span><span>↑/W Springen</span>
      <span><b>A</b> Schlag</span><span><b>S</b> Kick</span><span><b>D</b> Block</span>
    </div>
  </div>
  <div id="combo-display"></div>
</div>

<script>
const bgC=document.getElementById('bg'),bgX=bgC.getContext('2d');
const gc=document.getElementById('gc'),gx=gc.getContext('2d');
const W=800,H=360,GY=H-55,G=0.58;

function lerp(a,b,t){return a+(b-a)*t;}

// ─── LEVELS ─────────────────────────────────────────────────────────────────
function drawPlatform(c,fill,glow,x,y,w,h){
  c.fillStyle=fill;c.shadowColor=glow;c.shadowBlur=8;
  c.fillRect(x,y,w,h);c.strokeStyle=glow;c.lineWidth=1.5;
  c.strokeRect(x,y,w,h);c.shadowBlur=0;
}

const LEVELS=[
  {
    name:'WAREHOUSE',botSpeed:3.2,botAggr:0.52,
    platforms:[{x:110,y:GY-80,w:140},{x:550,y:GY-80,w:140}],
    playerCol:'#00ffcc',botCol:'#ff3300',
    draw(c){
      const g=c.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#0c0c10');g.addColorStop(1,'#1a0a08');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      c.strokeStyle='#1e1e28';c.lineWidth=18;
      for(let x=0;x<W;x+=130){c.beginPath();c.moveTo(x,0);c.lineTo(x+65,GY-30);c.stroke();}
      // Crates
      c.lineWidth=2;
      [[55,GY-32,52,32,'#1a1208','#2a2010'],[685,GY-32,52,32,'#1a1208','#2a2010'],[350,GY-62,42,62,'#1e1408','#2a2010']].forEach(([x,y,w,h,f,s])=>{
        c.fillStyle=f;c.strokeStyle=s;c.fillRect(x,y,w,h);c.strokeRect(x,y,w,h);
        c.beginPath();c.moveTo(x,y);c.lineTo(x+w,y+h);c.moveTo(x+w,y);c.lineTo(x,y+h);c.stroke();
      });
      const fg=c.createLinearGradient(0,GY,0,H);
      fg.addColorStop(0,'rgba(255,80,20,0.22)');fg.addColorStop(1,'rgba(255,30,0,0.03)');
      c.fillStyle=fg;c.fillRect(0,GY,W,H-GY);
      c.strokeStyle='#ff3300';c.lineWidth=2;c.shadowColor='#ff3300';c.shadowBlur=14;
      c.beginPath();c.moveTo(0,GY);c.lineTo(W,GY);c.stroke();c.shadowBlur=0;
      drawPlatform(c,'#2a1a00','#ff6600',110,GY-80,140,12);
      drawPlatform(c,'#2a1a00','#ff6600',550,GY-80,140,12);
    }
  },
  {
    name:'ROOFTOP',botSpeed:3.9,botAggr:0.68,
    platforms:[{x:140,y:GY-90,w:100},{x:360,y:GY-68,w:120},{x:565,y:GY-100,w:100}],
    playerCol:'#44aaff',botCol:'#cc33ff',
    draw(c){
      const g=c.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#04040e');g.addColorStop(1,'#0a0820');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      // Stars
      for(let i=0;i<70;i++){
        const sx=(Math.sin(i*137.508)*0.5+0.5)*W;
        const sy=(Math.sin(i*97.308)*0.5+0.5)*(GY-10);
        c.fillStyle=`rgba(255,255,255,${0.3+Math.sin(i)*0.3})`;
        c.beginPath();c.arc(sx,sy,i%7===0?1.5:0.7,0,Math.PI*2);c.fill();
      }
      // Moon
      c.fillStyle='rgba(255,250,220,0.9)';c.shadowColor='#fffadc';c.shadowBlur=30;
      c.beginPath();c.arc(680,55,28,0,Math.PI*2);c.fill();
      c.fillStyle='#04040e';c.shadowBlur=0;
      c.beginPath();c.arc(690,49,24,0,Math.PI*2);c.fill();
      // City
      c.fillStyle='#06060f';
      const buildings=[[0,210,75],[75,175,55],[130,195,48],[178,152,68],[246,182,38],[284,142,78],[362,162,48],[410,178,58],[468,148,68],[536,170,52],[588,157,78],[666,174,48],[714,162,52],[766,178,34]];
      buildings.forEach(([bx,by,bw])=>{
        c.fillRect(bx,by,bw,H-by);
        c.fillStyle='rgba(255,230,100,0.12)';
        for(let wy=by+8;wy<H-20;wy+=13){
          for(let wx=bx+5;wx<bx+bw-5;wx+=9){
            if(Math.random()<0.35)c.fillRect(wx,wy,4,6);
          }
        }
        c.fillStyle='#06060f';
      });
      // Rooftop
      const fg=c.createLinearGradient(0,GY,0,H);
      fg.addColorStop(0,'rgba(60,130,255,0.18)');fg.addColorStop(1,'rgba(20,60,200,0.03)');
      c.fillStyle=fg;c.fillRect(0,GY,W,H-GY);
      c.strokeStyle='#4488ff';c.lineWidth=2;c.shadowColor='#4488ff';c.shadowBlur=14;
      c.beginPath();c.moveTo(0,GY);c.lineTo(W,GY);c.stroke();c.shadowBlur=0;
      // AC units
      c.fillStyle='#0e1020';c.strokeStyle='#1a2040';c.lineWidth=1.5;
      [[25,GY-26,44,26],[720,GY-26,50,26]].forEach(([x,y,w,h])=>{c.fillRect(x,y,w,h);c.strokeRect(x,y,w,h);});
      drawPlatform(c,'#0a1030','#4488ff',140,GY-90,100,10);
      drawPlatform(c,'#0a1030','#4488ff',360,GY-68,120,10);
      drawPlatform(c,'#0a1030','#4488ff',565,GY-100,100,10);
    }
  },
  {
    name:'DOJO',botSpeed:4.5,botAggr:0.82,
    platforms:[{x:170,y:GY-88,w:115},{x:515,y:GY-88,w:115}],
    playerCol:'#ffcc44',botCol:'#ff6600',
    draw(c){
      const g=c.createLinearGradient(0,0,0,H);
      g.addColorStop(0,'#0e0804');g.addColorStop(1,'#1e0e04');
      c.fillStyle=g;c.fillRect(0,0,W,H);
      // Shoji grid
      c.strokeStyle='rgba(255,200,100,0.035)';c.lineWidth=1;
      for(let x=0;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
      for(let y=0;y<H;y+=40){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
      // Pillars
      [80,720].forEach(px=>{
        c.fillStyle='#180c04';c.strokeStyle='#3a2010';c.lineWidth=3;
        c.fillRect(px-14,0,28,H);c.strokeRect(px-14,0,28,H);
        // Lantern
        const ly=GY-90;
        const lg=c.createRadialGradient(px,ly,2,px,ly,22);
        lg.addColorStop(0,'rgba(255,160,0,0.4)');lg.addColorStop(1,'rgba(255,80,0,0)');
        c.fillStyle=lg;c.beginPath();c.arc(px,ly,30,0,Math.PI*2);c.fill();
        c.strokeStyle='#ff9900';c.lineWidth=1.5;c.shadowColor='#ff9900';c.shadowBlur=18;
        c.beginPath();c.ellipse(px,ly,9,16,0,0,Math.PI*2);c.stroke();c.shadowBlur=0;
        // string
        c.strokeStyle='#3a2010';c.lineWidth=1;
        c.beginPath();c.moveTo(px,ly-16);c.lineTo(px,0);c.stroke();
      });
      // Tatami
      const fg=c.createLinearGradient(0,GY,0,H);
      fg.addColorStop(0,'rgba(220,150,40,0.2)');fg.addColorStop(1,'rgba(180,90,0,0.04)');
      c.fillStyle=fg;c.fillRect(0,GY,W,H-GY);
      c.strokeStyle='rgba(180,110,20,0.25)';c.lineWidth=1;
      for(let x=0;x<W;x+=100){c.beginPath();c.moveTo(x,GY);c.lineTo(x,H);c.stroke();}
      c.strokeStyle='#cc8800';c.lineWidth=2;c.shadowColor='#cc8800';c.shadowBlur=12;
      c.beginPath();c.moveTo(0,GY);c.lineTo(W,GY);c.stroke();c.shadowBlur=0;
      drawPlatform(c,'#2a1600','#cc8800',170,GY-88,115,14);
      drawPlatform(c,'#2a1600','#cc8800',515,GY-88,115,14);
    }
  }
];

// ─── FIGHTER CLASS ─────────────────────────────────────────────────────────
class Fighter{
  constructor(x,dir,col,isBot,lvl){
    this.x=x;this.y=GY;this.vy=0;this.vx=0;
    this.dir=dir;this.col=col;this.isBot=isBot;
    this.hp=100;this.state='idle';
    this.stateTimer=0;this.blocking=false;
    this.onGround=true;this.hurtTimer=0;
    this.frame=0;this.frameTimer=0;
    const lv=LEVELS[lvl-1];
    this.speed=isBot?lv.botSpeed:3.9;
    this.platforms=lv.platforms;
    this.aggr=isBot?lv.botAggr:0;
    // Limb angles (smooth IK-style)
    this.lHip=0;this.rHip=0;this.lKnee=0;this.rKnee=0;
    this.lShoulder=0;this.rShoulder=0;this.lElbow=0;this.rElbow=0;
    this.bodyLean=0;this.headTilt=0;
    // AI
    this.aiTimer=0;this.aiAction='idle';this.aiDuration=0;
    // Combo
    this.combo=0;this.comboTimer=0;
  }

  jump(){
    if(this.onGround&&!['punch','kick','hurt'].includes(this.state)){
      this.vy=-13.8;this.onGround=false;this.state='jump';
    }
  }

  punch(other){
    if(['punch','kick','hurt','dead'].includes(this.state))return;
    this.state='punch';this.stateTimer=20;
    setTimeout(()=>this.doHit(other,9,0),90);
  }

  kick(other){
    if(['punch','kick','hurt','dead'].includes(this.state))return;
    this.state='kick';this.stateTimer=26;
    setTimeout(()=>this.doHit(other,15,1),110);
  }

  doHit(other,dmg,type){
    if(this.state==='dead')return;
    if(Math.abs(this.x-other.x)<74){
      if(other.blocking&&Math.sign(other.x-this.x)!==this.dir)dmg=Math.max(1,Math.floor(dmg*0.1));
      other.takeDamage(dmg,this.dir,type);
      spawnHitEffect(other.x,other.y-52,dmg,type);
      if(!this.isBot){this.combo++;this.comboTimer=85;}
    }
  }

  takeDamage(dmg,fromDir,type){
    if(this.state==='dead')return;
    this.hp=Math.max(0,this.hp-dmg);
    this.hurtTimer=18;
    if(this.state!=='block'){this.state='hurt';this.stateTimer=14;}
    this.vx=fromDir*5;
    if(this.hp<=0)this.state='dead';
  }

  update(keys,other){
    if(this.state==='dead')return;
    // Gravity
    if(!this.onGround){
      this.vy+=G;this.y+=this.vy;
      if(this.vy>0){
        for(const p of this.platforms){
          if(this.x>p.x-8&&this.x<p.x+p.w+8&&this.y>=p.y&&this.y<=p.y+20){
            this.y=p.y;this.vy=0;this.onGround=true;
            if(this.state==='jump')this.state='idle';break;
          }
        }
      }
      if(!this.onGround&&this.y>=GY){
        this.y=GY;this.vy=0;this.onGround=true;
        if(this.state==='jump')this.state='idle';
      }
    }
    // Check platform edges
    if(this.onGround&&this.y<GY){
      let onP=false;
      for(const p of this.platforms){
        if(this.x>p.x-10&&this.x<p.x+p.w+10&&this.y<=p.y+2){onP=true;break;}
      }
      if(!onP){this.onGround=false;}
    }
    // Horizontal
    this.vx*=0.72;this.x+=this.vx;
    this.x=Math.max(16,Math.min(W-16,this.x));
    // Timers
    if(this.stateTimer>0){this.stateTimer--;if(this.stateTimer===0&&['punch','kick','hurt'].includes(this.state))this.state='idle';}
    if(this.hurtTimer>0)this.hurtTimer--;
    if(this.comboTimer>0)this.comboTimer--;else this.combo=0;

    if(this.isBot)this.updateAI(other);
    else this.updatePlayer(keys,other);

    if(this.onGround&&['idle','walk'].includes(this.state))this.dir=other.x>this.x?1:-1;
    this.animateLimbs();
    this.frameTimer++;if(this.frameTimer>5){this.frameTimer=0;this.frame=(this.frame+1)%8;}
  }

  animateLimbs(){
    const t=this.frame/8*Math.PI*2;
    const w=this.state==='walk';
    const j=!this.onGround;
    const p=this.state==='punch';
    const k=this.state==='kick';
    const bl=this.blocking;
    const h=this.state==='hurt';
    const D=this.dir;
    const s=0.25;

    if(w){
      this.lHip=lerp(this.lHip,Math.sin(t)*0.62,s);this.rHip=lerp(this.rHip,-Math.sin(t)*0.62,s);
      this.lKnee=lerp(this.lKnee,Math.max(0,Math.sin(t))*0.5,s);this.rKnee=lerp(this.rKnee,Math.max(0,-Math.sin(t))*0.5,s);
      this.lShoulder=lerp(this.lShoulder,-Math.sin(t)*0.45,s);this.rShoulder=lerp(this.rShoulder,Math.sin(t)*0.45,s);
    }else if(j){
      this.lHip=lerp(this.lHip,-0.55,0.18);this.rHip=lerp(this.rHip,-0.35,0.18);
      this.lKnee=lerp(this.lKnee,0.65,0.18);this.rKnee=lerp(this.rKnee,0.55,0.18);
    }else if(k){
      this.lHip=lerp(this.lHip,0.1,0.3);this.rHip=lerp(this.rHip,D*1.4,0.35);
      this.lKnee=lerp(this.lKnee,0,0.3);this.rKnee=lerp(this.rKnee,Math.max(0,D*0.7),0.35);
    }else{
      this.lHip=lerp(this.lHip,0,0.14);this.rHip=lerp(this.rHip,0,0.14);
      this.lKnee=lerp(this.lKnee,0,0.14);this.rKnee=lerp(this.rKnee,0,0.14);
    }

    if(p){this.rShoulder=lerp(this.rShoulder,D*1.15,0.4);this.lShoulder=lerp(this.lShoulder,-D*0.45,0.3);this.rElbow=lerp(this.rElbow,D*0.5,0.4);}
    else if(k){this.lShoulder=lerp(this.lShoulder,-0.55,0.3);this.rShoulder=lerp(this.rShoulder,0.4,0.3);}
    else if(bl){this.lShoulder=lerp(this.lShoulder,D*0.7,0.3);this.rShoulder=lerp(this.rShoulder,D*0.95,0.3);this.lElbow=lerp(this.lElbow,D*0.45,0.3);this.rElbow=lerp(this.rElbow,D*0.45,0.3);}
    else if(h){this.lShoulder=lerp(this.lShoulder,-D*0.4,0.3);this.rShoulder=lerp(this.rShoulder,-D*0.4,0.3);}
    else if(!w){this.lShoulder=lerp(this.lShoulder,0,0.12);this.rShoulder=lerp(this.rShoulder,0,0.12);}

    if(!p&&!bl){this.lElbow=lerp(this.lElbow,0,0.12);this.rElbow=lerp(this.rElbow,0,0.12);}

    if(w)this.bodyLean=lerp(this.bodyLean,D*0.09,0.15);
    else if(p)this.bodyLean=lerp(this.bodyLean,D*0.28,0.3);
    else if(h)this.bodyLean=lerp(this.bodyLean,-D*0.32,0.3);
    else this.bodyLean=lerp(this.bodyLean,0,0.12);

    this.headTilt=lerp(this.headTilt,h?-D*0.28:D*0.08,0.15);
  }

  updatePlayer(keys,other){
    this.blocking=false;
    if(['punch','kick','hurt'].includes(this.state))return;
    const left=keys['ArrowLeft'];const right=keys['ArrowRight'];
    if(left){this.x-=this.speed;this.dir=-1;if(this.onGround)this.state='walk';}
    else if(right){this.x+=this.speed;this.dir=1;if(this.onGround)this.state='walk';}
    else if(this.onGround&&this.state==='walk')this.state='idle';
    if((keys['ArrowUp']||keys['KeyW']||keys['Space'])&&this.onGround)this.jump();
    if(keys['KeyZ'])this.punch(other);
    if(keys['KeyX'])this.kick(other);
    if(keys['KeyC'])this.blocking=true;
  }

  updateAI(pl){
    this.aiTimer--;
    const dx=pl.x-this.x,dist=Math.abs(dx);
    if(this.aiTimer<=0){
      const r=Math.random();
      if(dist>115){this.aiAction='chase';this.aiDuration=25+Math.random()*35;}
      else if(dist<60&&r<this.aggr){this.aiAction=r<this.aggr*0.5?'punch':'kick';this.aiDuration=18;}
      else if(r<0.15){this.aiAction='jump';this.aiDuration=8;}
      else if(r<0.3){this.aiAction='block';this.aiDuration=20;}
      else if(r<0.55){this.aiAction='approach';this.aiDuration=20;}
      else{this.aiAction='retreat';this.aiDuration=14;}
      this.aiTimer=this.aiDuration;
    }
    this.dir=dx>0?1:-1;this.blocking=false;
    if(['punch','kick','hurt'].includes(this.state))return;
    if(this.aiAction==='chase'||this.aiAction==='approach'){this.x+=this.dir*this.speed*0.88;if(this.onGround)this.state='walk';}
    else if(this.aiAction==='retreat'){this.x-=this.dir*this.speed*0.6;if(this.onGround)this.state='walk';}
    else if(this.aiAction==='punch')this.punch(pl);
    else if(this.aiAction==='kick')this.kick(pl);
    else if(this.aiAction==='jump')this.jump();
    else if(this.aiAction==='block')this.blocking=true;
    else if(this.onGround)this.state='idle';
  }

  draw(c){
    if(this.state==='dead'){this.drawDead(c);return;}
    const x=this.x,y=this.y;
    const flicker=this.hurtTimer>0&&(this.hurtTimer%4<2);
    const col=flicker?'#ffffff':this.col;
    c.save();c.globalAlpha=flicker?0.55:1;
    c.strokeStyle=col;c.fillStyle=col;
    c.lineWidth=3;c.lineCap='round';c.lineJoin='round';
    c.shadowColor=col;c.shadowBlur=5;

    const bob=this.state==='walk'?Math.sin(this.frame/8*Math.PI*2)*2.5:0;
    const base=y+bob;
    const lean=this.bodyLean;
    const D=this.dir;

    // Pivot points
    const hipX=x,hipY=base-24;
    const shoulderX=x+Math.sin(lean)*27,shoulderY=base-50;
    const neckX=shoulderX,neckY=shoulderY;

    // === BACK LEG (opposite to facing dir) ===
    this._leg(c,hipX,hipY,this.lHip,this.lKnee,D,0.75);
    // === FRONT LEG ===
    this._leg(c,hipX,hipY,this.rHip,this.rKnee,D,1.0);
    // Hip bone
    c.lineWidth=2.5;
    c.beginPath();c.moveTo(hipX-9,hipY+2);c.lineTo(hipX+9,hipY+2);c.stroke();

    // === TORSO ===
    c.lineWidth=3.5;
    c.beginPath();c.moveTo(hipX,hipY);c.lineTo(shoulderX,shoulderY);c.stroke();
    // Shoulder span
    c.lineWidth=2.5;
    c.beginPath();c.moveTo(shoulderX-10,shoulderY);c.lineTo(shoulderX+10,shoulderY);c.stroke();

    // === BACK ARM ===
    this._arm(c,shoulderX,shoulderY,this.lShoulder,this.lElbow,D,0.7);
    // === FRONT ARM ===
    this._arm(c,shoulderX,shoulderY,this.rShoulder,this.rElbow,D,1.0);

    // === NECK ===
    c.lineWidth=2.5;
    const headX=neckX+Math.sin(this.headTilt)*7,headY=neckY-15;
    c.beginPath();c.moveTo(neckX,neckY);c.lineTo(headX,headY+11);c.stroke();

    // === HEAD ===
    c.lineWidth=3;c.shadowBlur=8;
    c.beginPath();c.arc(headX,headY,11,0,Math.PI*2);c.stroke();

    // Face
    c.shadowBlur=0;c.lineWidth=2;
    // Eye
    c.beginPath();c.arc(headX+D*5,headY-1,2.5,0,Math.PI*2);c.fill();
    // Expression
    c.lineWidth=1.5;
    if(this.blocking){
      c.beginPath();c.arc(headX+D*3,headY+4,3.5,0.1,Math.PI-0.1);c.stroke();
    }else if(this.state==='punch'){
      c.beginPath();c.moveTo(headX+D*2,headY+4);c.lineTo(headX+D*6,headY+3);c.stroke();
    }else if(this.hurtTimer>0){
      c.beginPath();c.arc(headX+D*2,headY+6,4,Math.PI+0.3,Math.PI*2-0.3);c.stroke();
    }else{
      // Neutral slight mouth
      c.beginPath();c.moveTo(headX+D*2,headY+5);c.lineTo(headX+D*5,headY+4);c.stroke();
    }

    // Block glow shield
    if(this.blocking){
      c.globalAlpha*=0.3;c.strokeStyle=this.isBot?'#ffaa33':'#33aaff';
      c.lineWidth=5;c.shadowColor=this.isBot?'#ffaa33':'#33aaff';c.shadowBlur=20;
      c.beginPath();c.arc(x,base-38,34,0,Math.PI*2);c.stroke();c.shadowBlur=0;
    }
    c.restore();
  }

  _leg(c,px,py,hip,knee,D,alpha){
    c.save();c.globalAlpha*=alpha;
    // Thigh
    const tx=px+Math.sin(hip)*26,ty=py+Math.cos(hip)*26;
    c.beginPath();c.moveTo(px,py);c.lineTo(tx,ty);c.stroke();
    // Shin
    const ka=hip+knee*0.85;
    const fx=tx+Math.sin(ka)*23,fy=ty+Math.cos(ka)*23;
    c.beginPath();c.moveTo(tx,ty);c.lineTo(fx,fy);c.stroke();
    // Foot
    c.lineWidth=2;
    c.beginPath();c.moveTo(fx,fy);c.lineTo(fx+D*9,fy+2);c.stroke();
    c.restore();
  }

  _arm(c,px,py,shoulder,elbow,D,alpha){
    c.save();c.globalAlpha*=alpha;
    const ax=px+Math.sin(shoulder)*22,ay=py+Math.cos(Math.abs(shoulder))*8+10;
    c.beginPath();c.moveTo(px,py);c.lineTo(ax,ay);c.stroke();
    const ea=shoulder+elbow*0.7;
    const hx=ax+Math.sin(ea)*18,hy=ay+Math.cos(Math.abs(ea))*8;
    c.beginPath();c.moveTo(ax,ay);c.lineTo(hx,hy);c.stroke();
    // Fist
    c.beginPath();c.arc(hx,hy,3.8,0,Math.PI*2);c.fill();
    c.restore();
  }

  drawDead(c){
    c.save();c.globalAlpha=0.65;
    c.strokeStyle=this.col;c.fillStyle=this.col;
    c.lineWidth=3;c.lineCap='round';
    c.translate(this.x,this.y);c.rotate(this.dir*1.55);
    // Body
    c.beginPath();c.moveTo(26,0);c.lineTo(-20,0);c.stroke();
    // Head
    c.beginPath();c.arc(40,0,11,0,Math.PI*2);c.stroke();
    // Arms
    c.beginPath();c.moveTo(5,0);c.lineTo(-5,-22);c.stroke();
    c.beginPath();c.moveTo(10,0);c.lineTo(16,-20);c.stroke();
    // Legs
    c.beginPath();c.moveTo(-10,0);c.lineTo(-16,20);c.stroke();
    c.beginPath();c.moveTo(-4,0);c.lineTo(-2,22);c.stroke();
    c.restore();
  }
}

// ─── EFFECTS ─────────────────────────────────────────────────────────────────
let particles=[],hitTexts=[];
function spawnParticles(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:1,col,r:1.5+Math.random()*2.5});
  }
}
function spawnHitEffect(x,y,dmg,type){
  const col=type===0?'#ffcc00':'#ff6600';
  spawnParticles(x,y,col,dmg>12?14:8);
  hitTexts.push({x,y,text:type===0?'PUNCH!':'KICK!!',life:1,vy:-1.5,col,size:dmg>12?17:13});
}
function updateFX(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.04;});
  hitTexts=hitTexts.filter(t=>t.life>0);
  hitTexts.forEach(t=>{t.y+=t.vy;t.life-=0.028;});
}
function drawFX(c){
  particles.forEach(p=>{
    c.save();c.globalAlpha=p.life*0.9;c.fillStyle=p.col;
    c.shadowColor=p.col;c.shadowBlur=7;
    c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill();c.restore();
  });
  hitTexts.forEach(t=>{
    c.save();c.globalAlpha=t.life;c.fillStyle=t.col;
    c.font=`900 ${t.size}px 'Black Ops One',cursive`;
    c.textAlign='center';c.shadowColor=t.col;c.shadowBlur=12;
    c.fillText(t.text,t.x,t.y);c.restore();
  });
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft')keys['ArrowLeft']=true;
  if(e.code==='ArrowRight')keys['ArrowRight']=true;
  if(e.code==='ArrowUp'||e.code==='KeyW'){keys['ArrowUp']=true;keys['KeyW']=true;e.preventDefault();}
  if(e.code==='Space'){keys['Space']=true;e.preventDefault();}
  if(e.code==='KeyA')keys['KeyZ']=true;
  if(e.code==='KeyS')keys['KeyX']=true;
  if(e.code==='KeyD')keys['KeyC']=true;
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft')keys['ArrowLeft']=false;
  if(e.code==='ArrowRight')keys['ArrowRight']=false;
  if(e.code==='ArrowUp'||e.code==='KeyW'){keys['ArrowUp']=false;keys['KeyW']=false;}
  if(e.code==='Space')keys['Space']=false;
  if(e.code==='KeyA')keys['KeyZ']=false;
  if(e.code==='KeyS')keys['KeyX']=false;
  if(e.code==='KeyD')keys['KeyC']=false;
});

// ─── GAME ────────────────────────────────────────────────────────────────────
let player,bot,running=false,animId=null,currentLevel=1;
let timerSecs=99,timerInterval=null;

function drawLvlBg(lvl){bgX.clearRect(0,0,W,H);LEVELS[lvl-1].draw(bgX);}

function updateHUD(){
  document.getElementById('p1hp').style.width=Math.max(0,player.hp)+'%';
  document.getElementById('p2hp').style.width=Math.max(0,bot.hp)+'%';
  const t=timerSecs;
  document.getElementById('timer-box').textContent=t<10?'0'+t:t;
  document.getElementById('timer-box').style.color=t<=10?'#ff8800':'#ff3300';
  const cd=document.getElementById('combo-display');
  if(player.combo>=2){cd.textContent='COMBO x'+player.combo;cd.style.color=player.combo>=5?'#ff3300':'#ffcc00';}
  else cd.textContent='';
}

function showOverlay(html){
  const ov=document.getElementById('overlay');
  ov.innerHTML=html;ov.style.display='flex';
}

function endGame(title,sub,playerWon){
  running=false;clearInterval(timerInterval);
  setTimeout(()=>{
    const nl=currentLevel+1,has=nl<=LEVELS.length;
    let b=`<button class="btn" onclick="startLevel(${currentLevel})">NOCHMAL</button>`;
    if(playerWon&&has)b=`<button class="btn green" onclick="startLevel(${nl})">LEVEL ${nl}: ${LEVELS[nl-1].name} →</button>`+b;
    if(!playerWon&&currentLevel>1)b+=`<button class="btn" style="border-color:#333;color:#333;font-size:0.7rem" onclick="startLevel(1)">VON VORNE</button>`;
    showOverlay(`<h2>${title}</h2><div class="${playerWon?'win':'sub'}">${sub}</div>${b}`);
  },1400);
}

function startLevel(lvl){
  currentLevel=lvl;
  document.getElementById('overlay').style.display='none';
  document.getElementById('round-label').textContent='LEVEL '+lvl;
  document.getElementById('level-label').textContent=LEVELS[lvl-1].name;
  drawLvlBg(lvl);

  const lv=LEVELS[lvl-1];
  player=new Fighter(165,1,lv.playerCol,false,lvl);
  bot=new Fighter(635,-1,lv.botCol,true,lvl);
  particles=[];hitTexts=[];
  timerSecs=99;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!running)return;
    timerSecs--;
    if(timerSecs<=0){
      timerSecs=0;running=false;clearInterval(timerInterval);
      const pw=player.hp>=bot.hp;
      setTimeout(()=>endGame(pw?'SIEG!':'NIEDERLAGE',pw?'ZEITLIMIT – MEHR HP!':'ZEITLIMIT – BOT GEWINNT!',pw),600);
    }
  },1000);

  running=true;
  if(animId)cancelAnimationFrame(animId);
  gameLoop();
}

function gameLoop(){
  gx.clearRect(0,0,W,H);
  player.update(keys,bot);bot.update(keys,player);
  updateFX();
  player.draw(gx);bot.draw(gx);
  drawFX(gx);
  // Labels
  gx.save();gx.font='bold 10px Share Tech Mono';gx.textAlign='center';
  const pc=player.col;gx.fillStyle=pc;gx.shadowColor=pc;gx.shadowBlur=6;
  gx.fillText('YOU',player.x,player.y-(player.y<GY?88:80));
  const bc=bot.col;gx.fillStyle=bc;gx.shadowColor=bc;gx.shadowBlur=6;
  gx.fillText('BOT',bot.x,bot.y-(bot.y<GY?88:80));
  gx.restore();
  updateHUD();
  if(player.state==='dead'||bot.state==='dead'){
    const pw=bot.state==='dead';
    endGame(pw?'SIEG!':'NIEDERLAGE',pw?'DU HAST GEWONNEN!':'DER BOT HAT DICH BESIEGT!',pw);
    return;
  }
  if(running)animId=requestAnimationFrame(gameLoop);
}

// Init
drawLvlBg(1);
</script>

window.addEventListener("keydown", function(e) {
    if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) {
        e.preventDefault();
    }
}, { passive: false });
</script>
