<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<title>SPACE DASH</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 800px;
    padding: 6px 0;
    font-size: 9px;
  }
  #hud span { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
  #hud .lives { color: #ff4466; text-shadow: 0 0 8px #ff4466; }
  #wrap {
    position: relative;
    width: 800px;
    height: 400px;
    border: 2px solid #00ffcc;
    box-shadow: 0 0 24px #00ffcc55, inset 0 0 40px #00000088;
    overflow: hidden;
  }
  canvas { display: block; }
  #overlay {
    position: absolute;
    inset: 0;
    background: #000000dd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    z-index: 10;
  }
  #overlay h1 {
    font-size: 28px;
    color: #00ffcc;
    text-shadow: 0 0 30px #00ffcc, 3px 3px #005544;
    letter-spacing: 4px;
  }
  #overlay .sub {
    font-size: 8px;
    color: #aaa;
    line-height: 2.2;
    text-align: center;
  }
  #overlay .win { font-size: 11px; color: #ffdd33; text-shadow: 0 0 20px #ffdd33; }
  #overlay .dead { font-size: 11px; color: #ff4466; text-shadow: 0 0 20px #ff4466; }
  #playbtn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    background: transparent;
    color: #00ffcc;
    border: 2px solid #00ffcc;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.1s;
    box-shadow: 0 0 12px #00ffcc44;
    animation: blink 1.2s infinite;
  }
  #playbtn:hover { background: #00ffcc22; box-shadow: 0 0 28px #00ffcc; }
  @keyframes blink {
    0%,100%{ box-shadow: 0 0 10px #00ffcc44; }
    50%{ box-shadow: 0 0 22px #00ffccaa; }
  }
  #hint { font-size: 8px; color: #333; margin-top: 8px; width: 800px; text-align: center; }
</style>
</head>
<body>

<div id="hud">
  <span id="lvlTxt">LEVEL 1 / 3</span>
  <span id="coinTxt">MÜNZEN: 0</span>
  <span class="lives" id="livesTxt">♥ ♥ ♥</span>
</div>
<div id="wrap">
  <canvas id="c" width="800" height="400"></canvas>
  <div id="overlay">
    <h1>SPACE DASH</h1>
    <p class="sub">Erreiche das Portal · Sammle Münzen<br>Weiche Lasern aus</p>
    <button id="playbtn">► STARTEN</button>
  </div>
</div>
<div id="hint">← → Bewegen &nbsp;|&nbsp; ↑ / LEERTASTE Springen &nbsp;|&nbsp; Doppelsprung möglich</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const playbtn = document.getElementById('playbtn');
const lvlTxt = document.getElementById('lvlTxt');
const coinTxt = document.getElementById('coinTxt');
const livesTxt = document.getElementById('livesTxt');

const W = 800, H = 400;
let gameState = 'menu';
let currentLevel = 0;
let lives = 3;
let totalCoins = 0;
let frame = 0;
let particles = [];

// ─── INPUT ────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) {
    keys[e.code] = true;
    if (gameState === 'playing' && (e.code === 'ArrowUp' || e.code === 'Space')) tryJump();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── LEVELS ───────────────────────────────────────
function makeLevels() {
  return [
    // LEVEL 1 — intro
    {
      worldW: 1400,
      bgColor: ['#000010','#00001a'],
      platforms: [
        {x:0,   y:350, w:300, h:16, c:'#8a2be2'},
        {x:350, y:310, w:120, h:14, c:'#8a2be2'},
        {x:520, y:270, w:100, h:14, c:'#8a2be2'},
        {x:670, y:230, w:100, h:14, c:'#8a2be2'},
        {x:820, y:195, w:100, h:14, c:'#9933ff'},
        {x:970, y:160, w:100, h:14, c:'#9933ff'},
        {x:1120,y:130, w:220, h:14, c:'#9933ff'},
      ],
      lasers: [
        {x:320, y:334, w:30, h:8, dir:1, range:0, speed:0},
        {x:648, y:214, w:22, h:8, dir:1, range:0, speed:0},
      ],
      coins: [
        {x:380,y:285},{x:440,y:285},{x:540,y:250},{x:600,y:250},
        {x:690,y:210},{x:840,y:170},{x:990,y:140},{x:1140,y:110},{x:1200,y:110},
      ],
      portal: {x:1290, y:80, w:34, h:54},
      start: {x:40, y:310},
    },
    // LEVEL 2 — moving lasers
    {
      worldW: 1600,
      bgColor: ['#000818','#001018'],
      platforms: [
        {x:0,   y:360, w:250, h:14, c:'#0066cc'},
        {x:300, y:320, w:100, h:14, c:'#0066cc'},
        {x:450, y:280, w:100, h:14, c:'#0077ee'},
        {x:600, y:240, w:100, h:14, c:'#0077ee'},
        {x:750, y:200, w:100, h:14, c:'#0088ff'},
        {x:900, y:250, w:100, h:14, c:'#0088ff'},
        {x:1050,y:200, w:100, h:14, c:'#00aaff'},
        {x:1200,y:160, w:100, h:14, c:'#00aaff'},
        {x:1350,y:120, w:200, h:14, c:'#00ccff'},
      ],
      lasers: [
        {x:285, y:344, w:28, h:8, dir:1, range:0,  speed:0},
        {x:420, y:304, w:28, h:8, dir:1, range:0,  speed:0},
        {x:570, y:264, w:28, h:8, dir:1, range:0,  speed:0},
        {x:700, y:155, w:80, h:7, dir:1, range:60, speed:1.4}, // moving!
        {x:870, y:185, w:80, h:7, dir:1, range:60, speed:1.8},
      ],
      coins: [
        {x:320,y:295},{x:360,y:295},{x:470,y:255},{x:530,y:255},
        {x:620,y:215},{x:680,y:215},{x:770,y:175},{x:920,y:225},
        {x:1070,y:175},{x:1220,y:135},{x:1370,y:100},{x:1430,y:100},
      ],
      portal: {x:1480, y:70, w:34, h:54},
      start: {x:40, y:320},
    },
    // LEVEL 3 — hardest
    {
      worldW: 1800,
      bgColor: ['#100010','#180018'],
      platforms: [
        {x:0,   y:360, w:200, h:14, c:'#cc0077'},
        {x:250, y:320, w:80,  h:14, c:'#cc0077'},
        {x:380, y:280, w:80,  h:14, c:'#dd0088'},
        {x:510, y:240, w:80,  h:14, c:'#dd0088'},
        {x:640, y:200, w:80,  h:14, c:'#ee0099'},
        {x:780, y:240, w:80,  h:14, c:'#ee0099'},
        {x:920, y:200, w:80,  h:14, c:'#ff00aa'},
        {x:1060,y:160, w:80,  h:14, c:'#ff00aa'},
        {x:1200,y:120, w:80,  h:14, c:'#ff44bb'},
        {x:1340,y:80,  w:80,  h:14, c:'#ff44bb'},
        {x:1480,y:120, w:80,  h:14, c:'#ff88cc'},
        {x:1580,y:80,  w:180, h:14, c:'#ff88cc'},
      ],
      lasers: [
        {x:230, y:344, w:20, h:8, dir:1, range:0,  speed:0},
        {x:360, y:304, w:20, h:8, dir:1, range:0,  speed:0},
        {x:600, y:145, w:90, h:7, dir:1, range:70, speed:2},
        {x:760, y:185, w:90, h:7, dir:-1,range:70, speed:2},
        {x:900, y:145, w:90, h:7, dir:1, range:70, speed:2.5},
        {x:1040,y:105, w:90, h:7, dir:-1,range:70, speed:2.5},
        {x:1320,y:45,  w:60, h:7, dir:1, range:60, speed:3},
      ],
      coins: [
        {x:265,y:295},{x:395,y:255},{x:525,y:215},{x:655,y:175},
        {x:795,y:215},{x:935,y:175},{x:1075,y:135},{x:1215,y:95},
        {x:1355,y:55},{x:1495,y:95},{x:1600,y:55},{x:1650,y:55},
      ],
      portal: {x:1700, y:30, w:34, h:54},
      start: {x:40, y:320},
    },
  ];
}

// deep copy levels each game
let levels;

// ─── PLAYER ───────────────────────────────────────
const player = {
  x:0, y:0, w:30, h:40,
  vx:0, vy:0,
  onGround:false,
  jumpsLeft:2,
  facingRight:true,
};
const GRAVITY = 0.52;
const SPEED = 3.2;
const JUMP = -11;

function resetPlayer() {
  const s = levels[currentLevel].start;
  player.x = s.x; player.y = s.y;
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.jumpsLeft = 2;
}

function tryJump() {
  if (player.jumpsLeft > 0) {
    player.vy = JUMP * (player.jumpsLeft === 2 ? 1 : 0.82);
    player.jumpsLeft--;
    addParticles(player.x+player.w/2, player.y+player.h, '#00ffcc', 6);
  }
}

// ─── COLLISION ────────────────────────────────────
function rectsOverlap(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

// ─── PARTICLES ────────────────────────────────────
function addParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: -Math.random()*4-1,
      life: 18+Math.random()*12,
      maxLife: 30,
      color, size: 2+Math.random()*3
    });
  }
}

// ─── STARS ────────────────────────────────────────
const stars = Array.from({length:100}, () => ({
  x: Math.random()*3000, y: Math.random()*H*0.85,
  s: Math.random()*1.8+0.3,
  t: Math.random()*Math.PI*2,
}));

// ─── UPDATE ───────────────────────────────────────
function update() {
  frame++;
  const lvl = levels[currentLevel];

  // move lasers
  lvl.lasers.forEach(l => {
    if (!l.range) return;
    if (!l.ox) l.ox = l.x;
    l.x += l.dir * l.speed;
    if (Math.abs(l.x - l.ox) >= l.range) l.dir *= -1;
  });

  // player movement
  if (keys['ArrowLeft'])  { player.vx = -SPEED; player.facingRight = false; }
  else if (keys['ArrowRight']) { player.vx = SPEED;  player.facingRight = true; }
  else player.vx *= 0.75;

  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;

  // platform collision
  lvl.platforms.forEach(p => {
    if (rectsOverlap(player, p) && player.vy > 0 &&
        player.y + player.h - player.vy <= p.y + 4) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
      player.jumpsLeft = 2;
    }
  });

  // world bounds
  player.x = Math.max(0, Math.min(player.x, lvl.worldW - player.w));

  // coins
  lvl.coins.forEach(c => {
    if (c.collected) return;
    if (rectsOverlap(player, {x:c.x-10,y:c.y-10,w:20,h:20})) {
      c.collected = true;
      totalCoins++;
      addParticles(c.x, c.y, '#ffdd33', 10);
      updateHUD();
    }
  });

  // lasers
  lvl.lasers.forEach(l => {
    if (rectsOverlap(player, l)) die();
  });

  // portal
  if (rectsOverlap(player, lvl.portal)) {
    addParticles(lvl.portal.x+17, lvl.portal.y+27, '#00ffcc', 20);
    currentLevel++;
    if (currentLevel >= levels.length) {
      winGame(); return;
    }
    resetPlayer();
    updateHUD();
  }

  // fall off
  if (player.y > H + 80) die();

  // particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
    return p.life > 0;
  });
}

function die() {
  addParticles(player.x+15, player.y+20, '#ff4466', 18);
  lives--;
  updateHUD();
  if (lives <= 0) { loseGame(); return; }
  resetPlayer();
}

// ─── DRAW ─────────────────────────────────────────
function draw() {
  const lvl = levels[currentLevel];
  const camX = Math.max(0, Math.min(player.x - W/2 + player.w/2, lvl.worldW - W));

  // background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, lvl.bgColor[0]);
  bg.addColorStop(1, lvl.bgColor[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // stars (parallax)
  ctx.save();
  stars.forEach(s => {
    s.t += 0.02;
    const alpha = 0.3 + Math.sin(s.t)*0.3;
    const sx = (s.x - camX * 0.25) % (lvl.worldW * 0.5 + W);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, s.y, s.s, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.save();
  ctx.translate(-camX, 0);

  // platforms
  lvl.platforms.forEach(p => {
    // glow
    ctx.shadowColor = p.c;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.c;
    ctx.fillRect(p.x, p.y, p.w, p.h);
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(p.x, p.y, p.w, 3);
    ctx.shadowBlur = 0;
  });

  // coins
  lvl.coins.forEach(c => {
    if (c.collected) return;
    const bob = Math.sin(frame * 0.08 + c.x) * 3;
    ctx.save();
    ctx.shadowColor = '#ffdd33';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffdd33';
    ctx.beginPath();
    ctx.arc(c.x, c.y + bob, 8, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff6';
    ctx.beginPath();
    ctx.arc(c.x-2, c.y+bob-3, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });

  // lasers
  lvl.lasers.forEach(l => {
    ctx.save();
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#ff2244';
    ctx.fillRect(l.x, l.y, l.w, l.h);
    ctx.fillStyle = '#ff8899';
    ctx.fillRect(l.x, l.y, l.w, 2);
    ctx.restore();
  });

  // portal
  drawPortal(lvl.portal);

  // player
  drawPlayer();

  ctx.restore();

  // particles (world space)
  ctx.save();
  ctx.translate(-camX, 0);
  particles.forEach(p => {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPortal(portal) {
  const cx = portal.x + portal.w/2;
  const cy = portal.y + portal.h/2;
  const pulse = Math.sin(frame * 0.07) * 4;

  // outer glow ring
  ctx.save();
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 30;

  // portal oval
  ctx.strokeStyle = '#00ffcc';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, portal.w/2 + pulse, portal.h/2 + pulse, 0, 0, Math.PI*2);
  ctx.stroke();

  // inner fill
  const grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, portal.w/2);
  grad.addColorStop(0, '#00ffcc55');
  grad.addColorStop(1, '#00ffcc00');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(cx, cy, portal.w/2 + pulse, portal.h/2 + pulse, 0, 0, Math.PI*2);
  ctx.fill();

  // spinning lines
  for (let i = 0; i < 6; i++) {
    const angle = (frame * 0.04) + (i / 6) * Math.PI * 2;
    const r = portal.w/2 + pulse;
    ctx.strokeStyle = `rgba(0,255,200,${0.3 + i*0.05})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle)*r, cy + Math.sin(angle)*(portal.h/2+pulse));
    ctx.stroke();
  }

  // label
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#00ffcc';
  ctx.font = '7px Press Start 2P';
  ctx.textAlign = 'center';
  ctx.fillText('ZIEL', cx, portal.y - 8);
  ctx.restore();
}

function drawPlayer() {
  const p = player;
  const flip = !p.facingRight;

  ctx.save();
  if (flip) {
    ctx.translate(p.x + p.w, 0);
    ctx.scale(-1, 1);
    ctx.translate(-p.x, 0);
  }

  // shadow on ground
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(p.x+p.w/2, 355, 14, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // body
  ctx.fillStyle = '#00aaff';
  ctx.fillRect(p.x+4, p.y+13, p.w-8, p.h-13);

  // head
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(p.x+5, p.y, p.w-10, 16);

  // visor / helmet
  ctx.fillStyle = '#003366';
  ctx.fillRect(p.x+5, p.y, p.w-10, 10);
  ctx.fillStyle = '#66ccff55';
  ctx.fillRect(p.x+7, p.y+1, p.w-14, 6);

  // eyes
  ctx.fillStyle = '#00ffcc';
  ctx.fillRect(p.x+9,  p.y+3, 4, 4);
  ctx.fillRect(p.x+18, p.y+3, 4, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(p.x+10, p.y+3, 2, 2);
  ctx.fillRect(p.x+19, p.y+3, 2, 2);

  // suit stripe
  ctx.fillStyle = '#0066cc';
  ctx.fillRect(p.x+4, p.y+20, p.w-8, 4);

  // jetpack
  ctx.fillStyle = '#888';
  ctx.fillRect(p.x+p.w-6, p.y+13, 6, 16);
  ctx.fillStyle = '#ff6600';
  if (!p.onGround) {
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur = 10;
    ctx.fillRect(p.x+p.w-4, p.y+28, 3, 5+Math.random()*4);
  }
  ctx.shadowBlur = 0;

  // legs
  const legSwing = p.onGround ? Math.sin(frame * 0.28) * 5 : 0;
  ctx.fillStyle = '#0055aa';
  ctx.fillRect(p.x+5,  p.y+p.h-11, 9, 11 + legSwing);
  ctx.fillRect(p.x+16, p.y+p.h-11, 9, 11 - legSwing);

  // boots
  ctx.fillStyle = '#002255';
  ctx.fillRect(p.x+4,  p.y+p.h-3, 11, 4);
  ctx.fillRect(p.x+15, p.y+p.h-3, 11, 4);

  ctx.restore();
}

// ─── HUD ──────────────────────────────────────────
function updateHUD() {
  lvlTxt.textContent  = `LEVEL ${currentLevel+1} / ${levels.length}`;
  coinTxt.textContent = `MÜNZEN: ${totalCoins}`;
  livesTxt.textContent = '♥ '.repeat(Math.max(0,lives)).trim() || '☆';
}

// ─── GAME STATES ──────────────────────────────────
function startGame() {
  levels = makeLevels();
  currentLevel = 0;
  lives = 3;
  totalCoins = 0;
  particles = [];
  frame = 0;
  resetPlayer();
  updateHUD();
  overlay.style.display = 'none';
  gameState = 'playing';
}

function winGame() {
  gameState = 'win';
  overlay.innerHTML = `
    <h1 style="color:#ffdd33;text-shadow:0 0 30px #ffdd33,3px 3px #554400">YOU WIN!</h1>
    <p class="win">Münzen: ${totalCoins} &nbsp;|&nbsp; Leben: ${lives}</p>
    <p class="sub">Alle Level abgeschlossen!</p>
    <button id="playbtn" onclick="location.reload()">► NOCHMAL</button>
  `;
  overlay.style.display = 'flex';
  styleBtn();
}

function loseGame() {
  gameState = 'lose';
  overlay.innerHTML = `
    <h1 style="color:#ff4466;text-shadow:0 0 30px #ff4466,3px 3px #330011">GAME OVER</h1>
    <p class="dead">Münzen gesammelt: ${totalCoins}</p>
    <button id="playbtn" onclick="location.reload()">► NOCHMAL</button>
  `;
  overlay.style.display = 'flex';
  styleBtn();
}

function styleBtn() {
  const b = document.getElementById('playbtn');
  if (!b) return;
  b.style.fontFamily = "'Press Start 2P', monospace";
  b.style.fontSize = '11px';
  b.style.background = 'transparent';
  b.style.color = '#00ffcc';
  b.style.border = '2px solid #00ffcc';
  b.style.padding = '10px 22px';
  b.style.cursor = 'pointer';
}

playbtn.addEventListener('click', () => {
  if (gameState === 'menu') startGame();
});

// ─── LOOP ─────────────────────────────────────────
function loop() {
  if (gameState === 'playing') {
    update();
    draw();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
