<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Jump and Run</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

#player {
    position: absolute;
    width: 40px;
    height: 40px;
    background: yellow;
    left: 100px;
    top: 100px;
}

#ground {
    position: absolute;
    width: 100%;
    height: 60px;
    background: #444;
    bottom: 0;
}

.platform {
    position: absolute;
    width: 120px;
    height: 20px;
    background: brown;
}

#enemy {
    position: absolute;
    width: 40px;
    height: 40px;
    background: red;
}
</style>
</head>

<body>

<div id="game">
    <div id="player"></div>
    <div id="ground"></div>

    <!-- Plattformen -->
    <div class="platform" style="left:300px; top:400px;"></div>
    <div class="platform" style="left:550px; top:300px;"></div>

    <!-- Gegner -->
    <div id="enemy" style="left:500px; top:100px;"></div>
</div>

<script>
let player = document.getElementById("player");
let enemy = document.getElementById("enemy");
let platforms = document.querySelectorAll(".platform");

let x = 100;
let y = 100;
let vx = 0;
let vy = 0;

const speed = 5;
const jumpForce = 18;
const gravity = 0.9;

let keys = {};
let isGrounded = false;

const groundY = window.innerHeight - 60;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {

    // Bewegung
    if (keys["ArrowLeft"] || keys["a"]) vx = -speed;
    else if (keys["ArrowRight"] || keys["d"]) vx = speed;
    else vx *= 0.8;

    // Springen
    if ((keys["ArrowUp"] || keys["w"] || keys[" "]) && isGrounded) {
        vy = -jumpForce;
        isGrounded = false;
    }

    // Schwerkraft
    vy += gravity;

    x += vx;
    y += vy;

    // Bildschirmgrenzen
    if (x < 0) x = 0;
    if (x + 40 > window.innerWidth) x = window.innerWidth - 40;

    // Boden
    if (y + 40 >= groundY) {
        y = groundY - 40;
        vy = 0;
        isGrounded = true;
    }

    // Plattformen (OHNE getBoundingClientRect)
    platforms.forEach(p => {
        let px = p.offsetLeft;
        let py = p.offsetTop;

        if (
            x + 40 > px &&
            x < px + 120 &&
            y + 40 > py &&
            y + 40 < py + 20 &&
            vy >= 0
        ) {
            y = py - 40;
            vy = 0;
            isGrounded = true;
        }
    });

    // Gegner
    let ex = enemy.offsetLeft;
    let ey = enemy.offsetTop;

    if (
        x < ex + 40 &&
        x + 40 > ex &&
        y < ey + 40 &&
        y + 40 > ey
    ) {
        alert("Game Over!");
        x = 100;
        y = 100;
        vx = 0;
        vy = 0;
    }

    player.style.left = x + "px";
    player.style.top = y + "px";

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
