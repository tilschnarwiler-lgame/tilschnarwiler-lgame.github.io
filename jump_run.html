<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Space Jump & Run</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      text-align: center;
      font-family: sans-serif;
      overflow: hidden;
    }

    canvas {
      border: 2px solid white;
      margin-top: 10px;
      background: radial-gradient(circle at center, #050510, #000);
    }
  </style>
</head>
<body>

<h2>🚀 Space Jump & Run</h2>
<canvas id="game" width="800" height="400"></canvas>
<p>Pfeiltasten = Bewegung | ↑ = Springen</p>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const keys = {};

// ✅ FIX: verhindert Scrollen + sorgt für stabile Eingabe
window.addEventListener("keydown", (e) => {
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) {
    e.preventDefault();
  }
  keys[e.code] = true;
}, { passive: false });

window.addEventListener("keyup", (e) => {
  keys[e.code] = false;
});

// PLAYER
const player = {
  x: 50,
  y: 300,
  w: 30,
  h: 30,
  vx: 0,
  vy: 0,
  onGround: false
};

const gravity = 0.5;
const speed = 3;
const jumpPower = -10;

let level = 0;

// LEVELS
const levels = [
  {
    width: 900,
    platforms: [
      {x:0,y:350,w:900,h:20},
      {x:150,y:300,w:120,h:10},
      {x:350,y:260,w:120,h:10},
      {x:550,y:300,w:120,h:10},
      {x:750,y:240,w:120,h:10}
    ],
    portal: {x:820,y:180,w:30,h:50},
    lasers: [{x:300,y:330,w:120,h:5}]
  },
  {
    width: 1000,
    platforms: [
      {x:0,y:350,w:1000,h:20},
      {x:120,y:310,w:80,h:10},
      {x:260,y:280,w:80,h:10},
      {x:420,y:250,w:80,h:10},
      {x:600,y:220,w:80,h:10},
      {x:760,y:180,w:80,h:10}
    ],
    portal: {x:900,y:140,w:30,h:50},
    lasers: [
      {x:400,y:340,w:150,h:5},
      {x:700,y:200,w:100,h:5}
    ]
  }
];

// COLLISION
function coll(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// RESET PLAYER
function reset(){
  player.x = 50;
  player.y = 300;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
}

// GAME LOOP
function loop(){
  const lvl = levels[level];

  const camX = Math.max(0, Math.min(player.x - 200, lvl.width - 800));

  // MOVE
  if(keys["ArrowLeft"]) player.vx = -speed;
  else if(keys["ArrowRight"]) player.vx = speed;
  else player.vx *= 0.8;

  if(keys["ArrowUp"] && player.onGround){
    player.vy = jumpPower;
    player.onGround = false;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;

  // PLATFORM COLLISION
  lvl.platforms.forEach(p=>{
    if(coll(player,p) && player.vy > 0){
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // LASERS
  lvl.lasers.forEach(l=>{
    if(coll(player,l)) reset();
  });

  // PORTAL
  if(coll(player,lvl.portal)){
    level = (level + 1) % levels.length;
    reset();
  }

  if(player.y > canvas.height) reset();

  // DRAW
  ctx.fillStyle = "#000010";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-camX,0);

  // platforms
  ctx.fillStyle = "#8a2be2";
  lvl.platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });

  // lasers
  ctx.fillStyle = "red";
  lvl.lasers.forEach(l=>{
    ctx.fillRect(l.x,l.y,l.w,l.h);
  });

  // portal
  ctx.fillStyle = "#00ffcc";
  ctx.fillRect(lvl.portal.x,lvl.portal.y,lvl.portal.w,lvl.portal.h);

  // player
  ctx.fillStyle = "#00aaff";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  ctx.restore();

  ctx.fillStyle = "white";
  ctx.fillText("Level: " + (level + 1), 10, 20);

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
