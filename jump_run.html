<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Simple Jump and Run</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #87CEEB;
    }

    #game {
        position: relative;
        width: 100vw;
        height: 100vh;
    }

    #player {
        position: absolute;
        width: 40px;
        height: 40px;
        background: yellow;
        border-radius: 5px;
        left: 100px;
        top: 100px;
    }

    #ground {
        position: absolute;
        width: 100%;
        height: 60px;
        background: #444;
        bottom: 0;
    }
</style>
</head>
<body>

<div id="game">
    <div id="player"></div>
    <div id="ground"></div>
</div>

<script>
// SPIELER
let player = document.getElementById("player");
let x = 100;
let y = 100;
let vx = 0;
let vy = 0;

const speed = 5;
const jumpForce = 18;
const gravity = 0.9;

let keys = {};
let isGrounded = false;

// BODEN
const groundY = window.innerHeight - 60; // Höhe des Bodens

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function update() {
    // Links/Rechts
    if (keys["ArrowLeft"] || keys["a"]) vx = -speed;
    else if (keys["ArrowRight"] || keys["d"]) vx = speed;
    else vx = 0;

    // Springen
    if ((keys["ArrowUp"] || keys["w"] || keys[" "]) && isGrounded) {
        vy = -jumpForce;
        isGrounded = false;
    }

    // Schwerkraft
    vy += gravity;

    // Position aktualisieren
    x += vx;
    y += vy;

    // Boden-Kollision
    if (y + 40 >= groundY) {
        y = groundY - 40;
        vy = 0;
        isGrounded = true;
    }

    // Spielerposition setzen
    player.style.left = x + "px";
    player.style.top = y + "px";

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
