<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: Arial;
    color: white;
}

h2 {
    margin: 10px;
}

button {
    padding: 10px 15px;
    margin-bottom: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #007bff;
    color: white;
    font-size: 16px;
}

canvas {
    background: black;
    border: 2px solid white;
}
</style>
</head>

<body>

<h2>🐍 Snake</h2>
<button onclick="restartGame()">🔁 Restart</button>

<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = 600;
const HEIGHT = 400;
const BLOCK = 20;

let snake, direction, food, score, highscore, gameOver;

highscore = localStorage.getItem("snake_highscore");
highscore = highscore ? parseInt(highscore) : 0;

// ---------------- START GAME ----------------
function startGame() {
    snake = [{x: 200, y: 200}];
    direction = "RIGHT";
    score = 0;
    gameOver = false;
    food = spawnFood();
}

// ---------------- FOOD ----------------
function spawnFood() {
    return {
        x: Math.floor(Math.random() * (WIDTH / BLOCK)) * BLOCK,
        y: Math.floor(Math.random() * (HEIGHT / BLOCK)) * BLOCK
    };
}

// ---------------- CONTROLS ----------------
document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
    if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
    if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
    if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
});

// ---------------- RESTART ----------------
function restartGame() {
    startGame();
}

// ---------------- UPDATE ----------------
function update() {
    if (gameOver) return;

    let head = {x: snake[0].x, y: snake[0].y};

    if (direction === "LEFT") head.x -= BLOCK;
    if (direction === "RIGHT") head.x += BLOCK;
    if (direction === "UP") head.y -= BLOCK;
    if (direction === "DOWN") head.y += BLOCK;

    // 🌍 WRAP AROUND
    if (head.x < 0) head.x = WIDTH - BLOCK;
    else if (head.x >= WIDTH) head.x = 0;

    if (head.y < 0) head.y = HEIGHT - BLOCK;
    else if (head.y >= HEIGHT) head.y = 0;

    // 💀 SELF COLLISION
    for (let part of snake) {
        if (part.x === head.x && part.y === head.y) {
            gameOver = true;
            saveHighscore();
            return;
        }
    }

    snake.unshift(head);

    // 🍎 FOOD
    if (head.x === food.x && head.y === food.y) {
        score++;
        if (score > highscore) highscore = score;
        food = spawnFood();
    } else {
        snake.pop();
    }
}

// ---------------- HIGH SCORE ----------------
function saveHighscore() {
    if (score > highscore) {
        highscore = score;
        localStorage.setItem("snake_highscore", highscore);
    }
}

// ---------------- DRAW SNAKE ----------------
function drawSnake() {
    snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? "darkgreen" : "lime";
        ctx.fillRect(s.x, s.y, BLOCK, BLOCK);

        // 👀 Augen am Kopf
        if (i === 0) {
            ctx.fillStyle = "white";
            ctx.fillRect(s.x + 5, s.y + 5, 4, 4);
            ctx.fillRect(s.x + 12, s.y + 5, 4, 4);
        }
    });
}

// ---------------- DRAW ----------------
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, WIDTH, HEIGHT);

    // FOOD
    ctx.fillStyle = "red";
    ctx.fillRect(food.x, food.y, BLOCK, BLOCK);

    drawSnake();

    // UI
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("Score: " + score, 10, 20);
    ctx.fillText("Highscore: " + highscore, 10, 45);

    // GAME OVER SCREEN
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "white";
        ctx.font = "30px Arial";
        ctx.fillText("GAME OVER", 200, 180);

        ctx.font = "18px Arial";
        ctx.fillText("Klick Restart oder drücke den Button", 140, 220);
    }
}

// ---------------- LOOP ----------------
function loop() {
    update();
    draw();
    setTimeout(loop, 100);
}

// START
startGame();
loop();
</script>

</body>
</html>
