<!DOCTYPE html>
<html>
<head>
  <title>Tower Defense</title>
  <style>
    canvas { display: block; margin: auto; background: #4caf50; }
  </style>
</head>
<body>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GRID_SIZE = 40;
const COLS = 600 / GRID_SIZE;
const ROWS = 600 / GRID_SIZE;

const CENTER = { x: Math.floor(COLS/2), y: Math.floor(ROWS/2) };

let baseHP = 100;
let money = 120;

let gameOver = false;

let enemies = [];
let towers = [];
let arrows = [];

let buildMode = false;
let showGrid = false;

let message = "";
let messageTimer = 0;

/* REMOVE BUTTON */
let removeButton = null;

/* ---------------- TERRAIN ---------------- */

const terrain = [];

function randomTerrain() {
  for (let y = 0; y < ROWS; y++) {
    terrain[y] = [];
    for (let x = 0; x < COLS; x++) {

      if (x === CENTER.x && y === CENTER.y) {
        terrain[y][x] = 0;
        continue;
      }

      const r = Math.random();
      if (r < 0.55) terrain[y][x] = 0; // grass
      else if (r < 0.70) terrain[y][x] = 1; // bush
      else if (r < 0.88) terrain[y][x] = 2; // tree
      else terrain[y][x] = 3; // rock
    }
  }
}
randomTerrain();

/* ---------------- GRID ---------------- */

let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));

/* ---------------- WAVES ---------------- */

let wave = 1;
let enemiesToSpawn = 0;
let spawnTimer = 0;
let waveCooldown = 0;

function startWave() {
  enemiesToSpawn = 5 + wave * 2;
  spawnTimer = 30;
  waveCooldown = 0;
}

function spawnEnemy() {
  const side = Math.floor(Math.random() * 4);

  let x, y;

  if (side === 0) { x = 0; y = Math.floor(Math.random() * ROWS); }
  if (side === 1) { x = COLS - 1; y = Math.floor(Math.random() * ROWS); }
  if (side === 2) { x = Math.floor(Math.random() * COLS); y = 0; }
  if (side === 3) { x = Math.floor(Math.random() * COLS); y = ROWS - 1; }

  enemies.push({
    x,
    y,
    hp: 1 + Math.floor(wave / 2),
    speed: 0.03 + wave * 0.002
  });
}

/* ---------------- MESSAGE ---------------- */

function showMessage(text) {
  message = text;
  messageTimer = 80;
}

/* ---------------- REMOVE BUTTON ---------------- */

function createRemoveButton(mx, my, gx, gy, type) {
  removeButton = {
    x: mx,
    y: my,
    gx,
    gy,
    type,
    cost: type === 2 ? 40 : 20
  };
}

/* ---------------- INPUT ---------------- */

canvas.addEventListener("click", (e) => {

  const mx = e.offsetX;
  const my = e.offsetY;

  const gx = Math.floor(mx / GRID_SIZE);
  const gy = Math.floor(my / GRID_SIZE);

  if (gameOver) {
    if (mx > 200 && mx < 400 && my > 260 && my < 320) {
      location.reload();
    }
    return;
  }

  /* REMOVE BUTTON CLICK */
  if (removeButton) {
    if (mx > removeButton.x && mx < removeButton.x + 180 &&
        my > removeButton.y && my < removeButton.y + 40) {

      if (money >= removeButton.cost) {
        money -= removeButton.cost;
        terrain[removeButton.gy][removeButton.gx] = 0;
      }

      removeButton = null;
      return;
    }
  }

  /* CLICK TREE / BUSH -> SHOW REMOVE */
  const t = terrain[gy][gx];

  if (t === 1 || t === 2) {
    createRemoveButton(mx, my, gx, gy, t);
    return;
  }

  /* BUILD MODE */
  if (mx >= 10 && mx <= 160 && my >= 60 && my <= 100) {
    buildMode = !buildMode;
    showGrid = buildMode;
    return;
  }

  if (!buildMode) return;

  const blocked = terrain[gy][gx] !== 0;
  const hasTower = grid[gy][gx] !== null;

  if (blocked || hasTower) {
    showMessage("❌ Feld ist besetzt!");
    return;
  }

  if (money >= 50) {
    grid[gy][gx] = true;
    towers.push({ x: gx, y: gy, cooldown: 0 });
    money -= 50;

    buildMode = false;
    showGrid = false;
  }
});

/* ---------------- UPDATE ---------------- */

function update() {

  if (messageTimer > 0) messageTimer--;

  if (gameOver) return;

  if (baseHP <= 0) {
    gameOver = true;
    return;
  }

  /* WAVES */
  if (enemiesToSpawn > 0) {

    spawnTimer--;

    if (spawnTimer <= 0) {
      spawnEnemy();
      enemiesToSpawn--;
      spawnTimer = Math.max(25 - wave * 2, 8);
    }

  } else if (enemies.length === 0) {

    waveCooldown++;

    if (waveCooldown > 120) {
      wave++;
      startWave();
    }
  }

  /* ENEMIES */
  enemies.forEach((e, i) => {

    const ex = e.x * GRID_SIZE + GRID_SIZE/2;
    const ey = e.y * GRID_SIZE + GRID_SIZE/2;

    const bx = CENTER.x * GRID_SIZE + GRID_SIZE/2;
    const by = CENTER.y * GRID_SIZE + GRID_SIZE/2;

    const dx = bx - ex;
    const dy = by - ey;
    const dist = Math.sqrt(dx*dx + dy*dy);

    e.x += (dx / dist) * e.speed;
    e.y += (dy / dist) * e.speed;

    if (dist < 10) {
      baseHP -= 1;
      enemies.splice(i, 1);
    }
  });

  /* TOWERS */
  towers.forEach(t => {

    if (t.cooldown > 0) t.cooldown--;

    const tx = t.x * GRID_SIZE + GRID_SIZE/2;
    const ty = t.y * GRID_SIZE + GRID_SIZE/2;

    enemies.forEach(e => {

      const ex = e.x * GRID_SIZE + GRID_SIZE/2;
      const ey = e.y * GRID_SIZE + GRID_SIZE/2;

      const dx = ex - tx;
      const dy = ey - ty;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 130 && t.cooldown === 0) {

        arrows.push({
          x: tx,
          y: ty,
          target: e,
          speed: 5
        });

        t.cooldown = 25;
      }
    });
  });

  /* ARROWS */
  arrows.forEach((a, i) => {

    if (!a.target) return;

    const ex = a.target.x * GRID_SIZE + GRID_SIZE/2;
    const ey = a.target.y * GRID_SIZE + GRID_SIZE/2;

    const dx = ex - a.x;
    const dy = ey - a.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    a.x += (dx / dist) * a.speed;
    a.y += (dy / dist) * a.speed;

    if (dist < 10) {
      a.target.hp -= 1;
      arrows.splice(i, 1);

      if (a.target.hp <= 0) {
        enemies = enemies.filter(en => en !== a.target);
        money += 5;
      }
    }
  });
}

/* ---------------- DRAW ---------------- */

function draw() {

  ctx.clearRect(0, 0, 600, 600);

  /* TERRAIN */
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {

      const t = terrain[y][x];
      const px = x * GRID_SIZE;
      const py = y * GRID_SIZE;

      ctx.fillStyle = "#4caf50";
      ctx.fillRect(px, py, GRID_SIZE, GRID_SIZE);

      if (t === 1) {
        ctx.fillStyle = "#2e7d32";
        ctx.beginPath();
        ctx.arc(px + 20, py + 25, 10, 0, Math.PI * 2);
        ctx.fill();
      }

      if (t === 2) {
        ctx.fillStyle = "#1b5e20";
        ctx.beginPath();
        ctx.arc(px + 20, py + 15, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#6d4c41";
        ctx.fillRect(px + 18, py + 20, 4, 12);
      }

      if (t === 3) {
        ctx.fillStyle = "#9e9e9e";
        ctx.fillRect(px + 10, py + 10, 20, 20);
      }
    }
  }

  /* GRID */
  if (showGrid) {
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        ctx.strokeRect(x * GRID_SIZE, y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
      }
    }
  }

  /* CASTLE */
  const cx = CENTER.x * GRID_SIZE;
  const cy = CENTER.y * GRID_SIZE;

  ctx.fillStyle = "#cfc7b0";
  ctx.fillRect(cx, cy, GRID_SIZE, GRID_SIZE);

  ctx.fillStyle = "#6b2e1a";
  ctx.fillRect(cx, cy - 10, GRID_SIZE, 10);

  ctx.fillStyle = "#4a2a16";
  ctx.fillRect(cx + 16, cy + 18, 8, 22);

  /* TOWERS */
  towers.forEach(t => {
    const x = t.x * GRID_SIZE;
    const y = t.y * GRID_SIZE;

    ctx.fillStyle = "#8b5a2b";
    ctx.fillRect(x + 12, y + 12, 16, 20);
  });

  /* ENEMIES */
  ctx.fillStyle = "#c62828";
  enemies.forEach(e => {
    ctx.beginPath();
    ctx.arc(e.x * GRID_SIZE + 20, e.y * GRID_SIZE + 20, 6, 0, Math.PI * 2);
    ctx.fill();
  });

  /* ARROWS */
  ctx.fillStyle = "#ffeb3b";
  arrows.forEach(a => {
    ctx.fillRect(a.x - 2, a.y - 2, 4, 4);
  });

  /* REMOVE BUTTON */
  if (removeButton) {
    ctx.fillStyle = "#e74c3c";
    ctx.fillRect(removeButton.x, removeButton.y, 180, 40);

    ctx.fillStyle = "white";
    ctx.fillText(
      removeButton.type === 2 ? "Remove Tree (40$)" : "Remove Bush (20$)",
      removeButton.x + 10,
      removeButton.y + 25
    );
  }

  /* UI */
  ctx.fillStyle = "white";
  ctx.fillText("HP: " + baseHP, 10, 20);
  ctx.fillText("Money: " + money, 10, 40);
  ctx.fillText("Wave: " + wave, 10, 60);

  ctx.fillStyle = buildMode ? "#2ecc71" : "#555";
  ctx.fillRect(10, 80, 150, 40);
  ctx.fillStyle = "white";
  ctx.fillText("ARCHER (50$)", 25, 105);

  /* MESSAGE */
  if (messageTimer > 0) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(180, 520, 240, 40);

    ctx.fillStyle = "white";
    ctx.fillText(message, 220, 545);
  }

  /* GAME OVER */
  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0, 0, 600, 600);

    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText("GAME OVER", 200, 260);

    ctx.fillRect(200, 280, 200, 60);
    ctx.fillStyle = "black";
    ctx.fillText("RESTART", 235, 320);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

startWave();
loop();
</script>

</body>
</html>
