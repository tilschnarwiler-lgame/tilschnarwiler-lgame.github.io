<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autorennen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:system-ui,sans-serif;padding:16px}
#wrap{position:relative;width:min(600px,100vw - 32px)}
canvas{display:block;border-radius:12px;border:1px solid rgba(255,255,255,0.1);width:100%;height:auto}
#hud{display:flex;gap:6px;padding:8px 0}
.hc{background:rgba(255,255,255,0.07);border-radius:8px;padding:5px 10px;display:flex;flex-direction:column;align-items:center;gap:1px;flex:1}
.hl{font-size:10px;color:rgba(255,255,255,0.45)}
.hv{font-size:16px;font-weight:500;color:#fff}
.hv-coin{color:#FAC775}
#ctrl{text-align:center;font-size:12px;color:rgba(255,255,255,0.3);padding:6px 0 2px}
#ov{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;background:rgba(10,14,20,0.88);border-radius:12px;padding:20px 16px}
#lobby-title{color:#fff;font-size:20px;font-weight:500;margin-bottom:4px;text-align:center}
#lobby-coins{color:#FAC775;font-size:13px;margin-bottom:14px}
#garage{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;margin-bottom:14px}
.car-card{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:5px}
.car-card.selected{border-color:#378ADD;background:rgba(55,138,221,0.15)}
.car-name{color:#fff;font-size:12px;font-weight:500}
.car-desc{font-size:10px;color:rgba(255,255,255,0.4)}
.car-tag{font-size:10px;padding:2px 10px;border-radius:4px;font-weight:500;cursor:default}
.tag-owned{background:rgba(39,180,100,0.2);color:#4fd98a}
.tag-active{background:rgba(55,138,221,0.3);color:#7ec8f7}
.tag-buy{background:rgba(250,199,117,0.25);color:#FAC775;cursor:pointer}
.tag-locked{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.35)}
#sb{display:none;flex-direction:column;align-items:center;width:100%;max-width:240px;margin-bottom:12px}
.sb-r{display:flex;justify-content:space-between;width:100%;padding:5px 10px;font-size:13px;border-bottom:.5px solid rgba(255,255,255,0.08)}
.sb-r:first-child{background:rgba(55,138,221,0.15);border-radius:6px 6px 0 0}
.sb-rk{color:rgba(255,255,255,0.4);width:20px}.sb-nm{color:#fff;flex:1;padding:0 6px}.sb-pt{color:#FAC775;font-weight:500}
.sb-t{color:rgba(255,255,255,0.4);font-size:11px;margin-bottom:4px;text-align:center}
#gov-title{color:#fff;font-size:22px;font-weight:500;margin-bottom:4px}
#gov-info{color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:12px;text-align:center}
.obtn{padding:10px 28px;font-size:14px;border-radius:8px;border:none;background:#378ADD;color:#fff;cursor:pointer;font-weight:500;margin-top:4px}
.obtn:hover{background:#185FA5}
.obtn-sec{background:rgba(255,255,255,0.1);margin-left:8px}
.obtn-sec:hover{background:rgba(255,255,255,0.18)}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div class="hc"><span class="hl">Punkte</span><span class="hv" id="hS">0</span></div>
    <div class="hc"><span class="hl">Highscore</span><span class="hv" id="hB">—</span></div>
    <div class="hc"><span class="hl">Level</span><span class="hv" id="hL">1</span></div>
    <div class="hc"><span class="hl">Leben</span><span class="hv" id="hV">♥♥♥</span></div>
    <div class="hc"><span class="hl">Münzen</span><span class="hv hv-coin" id="hC">0</span></div>
  </div>
  <canvas id="gameCanvas" width="600" height="550"></canvas>
  <div id="ov">
    <div id="lobby-view">
      <p id="lobby-title">Autorennen</p>
      <p id="lobby-coins">💰 <span id="lc-val">0</span> Münzen gesamt</p>
      <div id="garage"></div>
      <button class="obtn" id="sBtn">Spiel starten</button>
    </div>
    <div id="gov-view" style="display:none;flex-direction:column;align-items:center;width:100%">
      <p id="gov-title">Spiel vorbei!</p>
      <p id="gov-info"></p>
      <div id="sb"></div>
      <div style="display:flex;gap:0">
        <button class="obtn" id="reBtn">Nochmal</button>
        <button class="obtn obtn-sec" id="lobbyBtn">Garage</button>
      </div>
    </div>
  </div>
  <div id="ctrl">← → oder A / D zum Spurwechsel · Wischen auf dem Handy</div>
</div>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
const RL=W*.15,RR=W*.85,LW=(RR-RL)/3;
const LANES=[RL+LW*.5,RL+LW*1.5,RL+LW*2.5];
const PW=34,PH=58;

let hs=[],totalCoins=0,ownedCars=new Set(['sedan']),activeCar='sedan';
try{
  hs=JSON.parse(localStorage.getItem('rhs')||'[]');
  totalCoins=parseInt(localStorage.getItem('rcoins')||'0');
  ownedCars=new Set(JSON.parse(localStorage.getItem('rowned')||'["sedan"]'));
  activeCar=localStorage.getItem('ractivecar')||'sedan';
}catch(e){}
function persist(){
  try{
    localStorage.setItem('rhs',JSON.stringify(hs));
    localStorage.setItem('rcoins',String(totalCoins));
    localStorage.setItem('rowned',JSON.stringify([...ownedCars]));
    localStorage.setItem('ractivecar',activeCar);
  }catch(e){}
}

let state='lobby',score=0,lives=3,level=1,frame=0,sessionCoins=0;
let playerLane=1,playerX=LANES[1]-PW/2,targetX=LANES[1]-PW/2,playerY=H-95;
let enemies=[],coins=[],particles=[];
let roadOff=0,spawnT=0,coinT=0,invTimer=0;

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function hit(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function spd(){return 3+(level-1)*.85;}

function drawRoad(){
  ctx.fillStyle='#252525';ctx.fillRect(RL,0,RR-RL,H);
  ctx.fillStyle='#3a7a3a';ctx.fillRect(0,0,RL,H);ctx.fillRect(RR,0,W-RR,H);
  ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2.5;ctx.setLineDash([28,20]);ctx.lineDashOffset=-roadOff;
  for(let i=1;i<3;i++){const x=RL+LW*i;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  ctx.setLineDash([]);ctx.strokeStyle='#fff';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(RL,0);ctx.lineTo(RL,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(RR,0);ctx.lineTo(RR,H);ctx.stroke();
}

function axle(x,w,ya){
  ctx.fillStyle='#0d0d0d';
  rr(x-6,ya,6,13,2);ctx.fill();rr(x+w,ya,6,13,2);ctx.fill();
  ctx.fillStyle='#2a2a2a';
  ctx.fillRect(x-5,ya+2,4,9);ctx.fillRect(x+w+1,ya+2,4,9);
}

const CAR_DEFS=[
  {id:'sedan',name:'Sedan',price:0,desc:'Dein Startwagen',
   col:{body:'#1e6db5',dark:'#134d80',glass:'rgba(180,220,255,0.88)',accent:'#4a9de0'},
   draw(x,y,c){
    axle(x,PW,y+8);axle(x,PW,y+PH-21);
    ctx.fillStyle='#0a1825';rr(x+2,y+3,PW-4,PH-3,5);ctx.fill();
    ctx.fillStyle=c.body;rr(x,y,PW,PH,5);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(x+2,y+2,PW-4,13);
    ctx.fillStyle=c.glass;rr(x+3,y+15,PW-6,11,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(x+5,y+15,PW-10,2);
    ctx.fillStyle=c.dark;ctx.fillRect(x,y+26,PW,4);
    ctx.fillStyle=c.dark;ctx.fillRect(x+PW/2-2,y+15,4,11);
    ctx.fillStyle=c.glass;rr(x+3,y+30,PW-6,10,3);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(x+2,y+40,PW-4,14);
    ctx.fillStyle='#ffd700';rr(x+2,y+2,9,6,2);ctx.fill();rr(x+PW-11,y+2,9,6,2);ctx.fill();
    ctx.fillStyle='#fffacc';ctx.fillRect(x+3,y+3,6,3);ctx.fillRect(x+PW-9,y+3,6,3);
    ctx.fillStyle='#880000';ctx.fillRect(x+2,y+PH-6,9,5);ctx.fillRect(x+PW-11,y+PH-6,9,5);
    ctx.fillStyle='#ff4444';ctx.fillRect(x+3,y+PH-5,6,3);ctx.fillRect(x+PW-9,y+PH-5,6,3);
    ctx.fillStyle=c.dark;ctx.fillRect(x-3,y+17,3,4);ctx.fillRect(x+PW,y+17,3,4);
   }},
  {id:'sports',name:'Sportwagen',price:50,desc:'Tief, flach & schnell',
   col:{body:'#b22222',dark:'#6b1010',glass:'rgba(255,190,170,0.82)',accent:'#e74c3c'},

    const SW=PW+6,ox=x-3;
    axle(ox,SW,y+10);axle(ox,SW,y+PH-19);

    ctx.fillStyle=c.body;rr(ox,y+2,SW,PH-2,4);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,y+3,SW-4,20);
    ctx.fillStyle='#111';
    ctx.fillRect(ox+4,y+7,4,6);ctx.fillRect(ox+SW/2-2,y+7,4,6);ctx.fillRect(ox+SW-8,y+7,4,6);
    ctx.fillStyle=c.glass;rr(ox+3,y+23,SW-6,8,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(ox+5,y+23,SW-10,2);
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,y+31,SW-4,4);
    ctx.fillStyle=c.glass;rr(ox+3,y+35,SW-6,7,2);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,y+42,SW-4,PH-44);
    ctx.fillStyle='#111';ctx.fillRect(ox+1,y+PH-10,SW-2,5);
    ctx.fillStyle=c.accent;ctx.fillRect(ox-2,y+PH-11,SW+4,3);
    ctx.fillStyle='#fffacc';ctx.fillRect(ox+2,y+3,14,3);ctx.fillRect(ox+SW-16,y+3,14,3);
    ctx.fillStyle='rgba(255,255,150,0.4)';ctx.fillRect(ox+2,y+3,14,1);
    ctx.fillStyle=c.accent;ctx.fillRect(ox+2,y+PH-6,SW-4,5);
    ctx.fillStyle='#ff8080';ctx.fillRect(ox+3,y+PH-5,SW-6,3);
    ctx.fillStyle='#777';ctx.fillRect(ox+4,y+PH-2,5,2);ctx.fillRect(ox+SW-9,y+PH-2,5,2);
    ctx.fillStyle=c.dark;ctx.fillRect(ox-6,y+24,6,5);ctx.fillRect(ox+SW,y+24,6,5);
   }},
  {id:'minivan',name:'Minivan',price:100,desc:'Fuer die ganze Familie',
   col:{body:'#5d6d7e',dark:'#2e3c4a',glass:'rgba(200,230,255,0.88)',accent:'#85929e'},
   draw(x,y,c){
    const SW=PW+4,SH=PH+12,ox=x-2,oy=y-6;
    axle(ox,SW,oy+10);axle(ox,SW,oy+SH-22);
    ctx.fillStyle='#181f26';rr(ox+2,oy+2,SW-4,SH-2,4);ctx.fill();
    ctx.fillStyle=c.body;rr(ox,oy,SW,SH,4);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,oy+2,SW-4,10);
    ctx.fillStyle=c.glass;rr(ox+2,oy+12,SW-4,16,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.fillRect(ox+4,oy+12,SW-8,3);
    ctx.fillStyle=c.dark;ctx.fillRect(ox+SW/2-2,oy+12,4,16);
    ctx.fillStyle=c.dark;ctx.fillRect(ox,oy+28,SW,4);
    ctx.fillStyle=c.glass;rr(ox+2,oy+32,SW/2-3,14,2);ctx.fill();
    ctx.fillStyle=c.glass;rr(ox+SW/2+1,oy+32,SW/2-3,14,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.fillRect(ox+3,oy+32,SW/2-5,3);ctx.fillRect(ox+SW/2+2,oy+32,SW/2-5,3);
    ctx.fillStyle=c.accent;ctx.fillRect(ox+2,oy+46,SW-4,2);
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,oy+48,SW-4,SH-52);
    ctx.fillStyle=c.glass;rr(ox+3,oy+49,SW-6,8,2);ctx.fill();
    ctx.fillStyle='#3a3a3a';ctx.fillRect(ox+3,oy+1,SW-6,3);
    ctx.fillStyle='#555';ctx.fillRect(ox+5,oy+2,5,2);ctx.fillRect(ox+SW-10,oy+2,5,2);
    ctx.fillStyle='#ffd700';rr(ox+2,oy+2,11,8,2);ctx.fill();rr(ox+SW-13,oy+2,11,8,2);ctx.fill();
    ctx.fillStyle='#fffacc';ctx.fillRect(ox+3,oy+3,8,4);ctx.fillRect(ox+SW-11,oy+3,8,4);
    ctx.fillStyle='#880000';rr(ox+2,oy+SH-8,SW-4,7,2);ctx.fill();
    ctx.fillStyle='#ff4444';ctx.fillRect(ox+3,oy+SH-7,SW-6,4);
    ctx.fillStyle='#333';ctx.fillRect(ox+2,oy+SH-2,SW-4,2);
   }},
  {id:'suv',name:'SUV',price:200,desc:'Hoch, breit & gelaendetauglich',
   col:{body:'#1a5c34',dark:'#0d3320',glass:'rgba(150,220,170,0.85)',accent:'#27ae60'},
   draw(x,y,c){
    const SW=PW+8,SH=PH+10,ox=x-4,oy=y-5;
    axle(ox,SW,oy+11);axle(ox,SW,oy+SH-23);
    ctx.fillStyle='#1a1a1a';ctx.fillRect(ox+2,oy+SH-4,SW-4,4);
    ctx.fillStyle='#333';ctx.fillRect(ox+4,oy+SH-3,SW-8,3);
    ctx.fillStyle='#071210';rr(ox+2,oy+2,SW-4,SH-5,4);ctx.fill();
    ctx.fillStyle=c.body;rr(ox,oy,SW,SH-3,4);ctx.fill();
    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,oy+2,SW-4,18);
    ctx.fillStyle=c.body;ctx.fillRect(ox+SW/2-7,oy+4,14,13);
    ctx.fillStyle=c.dark;ctx.fillRect(ox+SW/2-5,oy+5,10,10);
    ctx.fillStyle='#111';ctx.fillRect(ox+SW/2-3,oy+7,6,6);
    ctx.fillStyle=c.glass;rr(ox+3,oy+20,SW-6,16,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(ox+5,oy+20,SW-10,3);
    ctx.fillStyle=c.dark;ctx.fillRect(ox+SW/2-2,oy+20,4,16);
    ctx.fillStyle=c.dark;ctx.fillRect(ox,oy+36,SW,5);
    ctx.fillStyle='#3a3a3a';ctx.fillRect(ox+3,oy+1,SW-6,3);
    ctx.fillStyle='#555';ctx.fillRect(ox+5,oy+2,6,2);ctx.fillRect(ox+SW-11,oy+2,6,2);

    ctx.fillStyle=c.dark;ctx.fillRect(ox+2,oy+54,SW-4,SH-59);

    ctx.fillStyle=c.accent;ctx.fillRect(ox+2,oy+10,13,1);ctx.fillRect(ox+SW-15,oy+10,13,1);

    ctx.fillStyle='#222';ctx.fillRect(ox+2,oy+SH-3,SW-4,3);
   }},
  {id:'monster',name:'Monster Truck',price:350,desc:'Riesig & unaufhaltbar',
   col:{body:'#7b0000',dark:'#3d0000',glass:'rgba(200,255,200,0.8)',accent:'#ff2222'},
   draw(x,y,c){
    const SW=PW+10,SH=PH+6,ox=x-5;
    const tW=10,tH=18;

    rr(ox-tW,y+6,tW,tH,3);ctx.fill();rr(ox+SW,y+6,tW,tH,3);ctx.fill();

   }},
  {id:'gold',name:'Goldflitzer',price:1000,desc:'Selten, edel & legendaer',

   draw(x,y,c){
    const LH=PH+14,oy=y-7;
    axle(x,PW,oy+9);axle(x,PW,oy+LH-22);
    ctx.fillStyle='#1a1000';rr(x+2,oy+3,PW-4,LH-3,7);ctx.fill();

  const pool=[];
  ENEMY_MODELS.forEach((m,i)=>{
    if(level<m.minLvl)return;
    let w=1;
    if(i===3)w=Math.min(3,level-3);
    if(i===4)w=Math.min(2,level-3);
    if(i===5)w=Math.min(3,level-4);
    if(i===6)w=Math.min(4,level-6);
    for(let k=0;k<Math.max(1,w);k++)pool.push(i);
  });
  const idx=pool[Math.floor(Math.random()*pool.length)];
  const model=ENEMY_MODELS[idx];
  const palIdx=idx===3?5:idx===4?8:idx===5?6:idx===6?7:Math.floor(Math.random()*5);
  enemies.push({x:LANES[Math.floor(Math.random()*3)]-model.w/2,y:-(model.h+10),model,pal:PALETTES[palIdx]});
}
function spawnCoin(){coins.push({x:LANES[Math.floor(Math.random()*3)],y:-14});}
function spawnParticles(x,y,col){
  for(let i=0;i<10;i++)particles.push({x,y,vx:(Math.random()-.5)*6,vy:(Math.random()-1.5)*5,life:45,col,r:Math.random()*4+1.5});
}
function drawCoin(c){
  ctx.save();ctx.beginPath();ctx.arc(c.x,c.y,10,0,Math.PI*2);
  ctx.fillStyle='#f5c542';ctx.fill();ctx.strokeStyle='#c8991a';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#7a5800';ctx.font='500 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$',c.x,c.y);ctx.restore();
}
function updateHUD(){
  document.getElementById('hS').textContent=score;
  document.getElementById('hB').textContent=hs[0]||'—';
  document.getElementById('hL').textContent=level;
  document.getElementById('hV').textContent='♥'.repeat(lives)||'✕';
  document.getElementById('hC').textContent=totalCoins;
}
function moveLane(dir){
  if(state!=='playing')return;
  const nl=playerLane+dir;if(nl<0||nl>2)return;
  playerLane=nl;targetX=LANES[playerLane]-PW/2;
}
function loop(){
  if(state!=='playing')return;
  frame++;const s=spd();
  roadOff=(roadOff+s)%48;
  playerX+=(targetX-playerX)*.18;
  spawnT++;if(spawnT>=Math.max(25,55-level*4)){spawnEnemy();spawnT=0;}
  coinT++;if(coinT>=72){spawnCoin();coinT=0;}
  enemies.forEach(e=>e.y+=s+1);
  coins.forEach(c=>c.y+=s);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.life--;});
  particles=particles.filter(p=>p.life>0);
  if(invTimer>0)invTimer--;
  if(!invTimer){
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(hit(playerX+4,playerY+4,PW-8,PH-8,e.x,e.y,e.model.w,e.model.h)){
        lives--;spawnParticles(playerX+PW/2,playerY+PH/2,'#e24b4a');
        enemies.splice(i,1);invTimer=80;
        if(lives<=0){updateHUD();endGame();return;}break;
      }
    }
  }
  for(let i=coins.length-1;i>=0;i--){
    if(hit(playerX,playerY,PW,PH,coins[i].x-10,coins[i].y-10,20,20)){
      score+=15;sessionCoins++;totalCoins++;
      spawnParticles(coins[i].x,coins[i].y,'#ffd700');coins.splice(i,1);
    }
  }
  enemies=enemies.filter(e=>e.y<H+e.model.h+20);
  coins=coins.filter(c=>c.y<H+20);
  score++;level=Math.min(10,1+Math.floor(score/400));
  ctx.clearRect(0,0,W,H);drawRoad();
  coins.forEach(drawCoin);
  enemies.forEach(e=>e.model.draw(e.x,e.y,e.pal));
  particles.forEach(p=>{ctx.globalAlpha=p.life/45;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  const cd=CAR_MAP[activeCar];
  if(!invTimer||Math.floor(invTimer/7)%2===0)cd.draw(playerX,playerY,cd.col);
  if(invTimer>0){ctx.fillStyle='rgba(255,60,60,0.15)';ctx.fillRect(0,0,W,H);}
  updateHUD();
  requestAnimationFrame(loop);
}
function startGame(){
  score=0;lives=3;level=1;frame=0;invTimer=0;sessionCoins=0;
  enemies=[];coins=[];particles=[];spawnT=0;coinT=0;
  playerLane=1;playerX=LANES[1]-PW/2;targetX=playerX;
  document.getElementById('ov').style.display='none';
  state='playing';loop();
}
function endGame(){
  state='idle';
  hs.push(score);hs.sort((a,b)=>b-a);hs=hs.slice(0,5);
  persist();showGameOver();
}
function showGameOver(){
  document.getElementById('lobby-view').style.display='none';
  const g=document.getElementById('gov-view');g.style.display='flex';
  document.getElementById('gov-info').textContent='Punkte: '+score+' · Level: '+level+' · Münzen +'+sessionCoins;
  const sb=document.getElementById('sb');
  if(hs.length){
    sb.style.display='flex';
    sb.innerHTML='<p class="sb-t">Bestenliste</p>'+hs.map((s,i)=>'<div class="sb-r"><span class="sb-rk">'+(i+1)+'.</span><span class="sb-nm">Spieler</span><span class="sb-pt">'+s+'</span></div>').join('');
  }
  document.getElementById('ov').style.display='flex';
  updateHUD();
}
function showLobby(){
  document.getElementById('gov-view').style.display='none';
  document.getElementById('lobby-view').style.display='';
  document.getElementById('ov').style.display='flex';
  renderGarage();updateHUD();
}
function makePreview(def){
  const c=document.createElement('canvas');c.width=70;c.height=90;
  const cx=c.getContext('2d');
  const col=def.col;
  const ox=35-PW/2,oy=45-PH/2;
  function pr(px,py,pw,ph,r2){
    cx.beginPath();cx.moveTo(px+r2,py);cx.lineTo(px+pw-r2,py);cx.arcTo(px+pw,py,px+pw,py+r2,r2);
    cx.lineTo(px+pw,py+ph-r2);cx.arcTo(px+pw,py+ph,px+pw-r2,py+ph,r2);cx.lineTo(px+r2,py+ph);
    cx.arcTo(px,py+ph,px,py+ph-r2,r2);cx.lineTo(px,py+r2);cx.arcTo(px,py,px+r2,py,r2);cx.closePath();
  }
  cx.fillStyle='rgba(0,0,0,0.4)';pr(ox+3,oy+4,PW,PH,6);cx.fill();
  cx.fillStyle=col.body;pr(ox,oy,PW,PH,6);cx.fill();
  cx.fillStyle=col.dark;cx.fillRect(ox+2,oy+1,PW-4,14);
  cx.fillStyle=col.glass;pr(ox+3,oy+15,PW-6,11,3);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.3)';cx.fillRect(ox+5,oy+15,PW-10,2);
  cx.fillStyle=col.dark;cx.fillRect(ox,oy+26,PW,5);
  cx.fillStyle=col.glass;pr(ox+3,oy+31,PW-6,10,3);cx.fill();
  cx.fillStyle=col.dark;cx.fillRect(ox+2,oy+41,PW-4,PH-43);
  cx.fillStyle='#ffd700';pr(ox+2,oy+2,9,6,2);cx.fill();pr(ox+PW-11,oy+2,9,6,2);cx.fill();
  cx.fillStyle='#fffacc';cx.fillRect(ox+3,oy+3,6,3);cx.fillRect(ox+PW-9,oy+3,6,3);
  cx.fillStyle='#aa0000';cx.fillRect(ox+2,oy+PH-6,9,5);cx.fillRect(ox+PW-11,oy+PH-6,9,5);
  cx.fillStyle='#ff4444';cx.fillRect(ox+3,oy+PH-5,6,3);cx.fillRect(ox+PW-9,oy+PH-5,6,3);
  if(col.accent){cx.strokeStyle=col.accent;cx.lineWidth=1.5;cx.beginPath();cx.moveTo(ox,oy+25);cx.lineTo(ox+PW,oy+25);cx.stroke();}
  return c;
}
function renderGarage(){
  document.getElementById('lc-val').textContent=totalCoins;
  const g=document.getElementById('garage');g.innerHTML='';
  CAR_DEFS.forEach(def=>{
    const owned=ownedCars.has(def.id);
    const active=activeCar===def.id;
    const card=document.createElement('div');
    card.className='car-card'+(active?' selected':'');
    const prev=makePreview(def);
    prev.style.cssText='width:70px;height:90px;border-radius:6px';
    card.appendChild(prev);
    const nm=document.createElement('span');nm.className='car-name';nm.textContent=def.name;card.appendChild(nm);
    const ds=document.createElement('span');ds.className='car-desc';ds.textContent=def.desc;card.appendChild(ds);
    if(active){
      const t=document.createElement('span');t.className='car-tag tag-active';t.textContent='Aktiv';card.appendChild(t);
    }else if(owned){
      const t=document.createElement('span');t.className='car-tag tag-owned';t.textContent='Auswählen';t.style.cursor='pointer';
      t.onclick=()=>{activeCar=def.id;persist();renderGarage();};
      card.appendChild(t);
    }else if(totalCoins>=def.price){
      const t=document.createElement('span');t.className='car-tag tag-buy';
      t.textContent='💰 '+def.price+' kaufen';
      t.onclick=()=>{totalCoins-=def.price;ownedCars.add(def.id);activeCar=def.id;persist();renderGarage();updateHUD();};
      card.appendChild(t);
    }else{
      const t=document.createElement('span');t.className='car-tag tag-locked';t.textContent='💰 '+def.price;card.appendChild(t);
    }
    g.appendChild(card);
  });
}
document.getElementById('sBtn').onclick=startGame;
document.getElementById('reBtn').onclick=startGame;
document.getElementById('lobbyBtn').onclick=showLobby;
let lHeld=false,rHeld=false,tx=null;
document.addEventListener('keydown',e=>{
  if((e.key==='ArrowLeft'||e.key==='a')&&!lHeld){lHeld=true;moveLane(-1);}
  if((e.key==='ArrowRight'||e.key==='d')&&!rHeld){rHeld=true;moveLane(1);}
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')lHeld=false;
  if(e.key==='ArrowRight'||e.key==='d')rHeld=false;
});
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchend',e=>{
  if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>20)moveLane(dx<0?-1:1);tx=null;
},{passive:false});
showLobby();
ctx.clearRect(0,0,W,H);drawRoad();
const ic=CAR_MAP[activeCar];ic.draw(playerX,playerY,ic.col);
updateHUD();
</script>
</body>
</html>
