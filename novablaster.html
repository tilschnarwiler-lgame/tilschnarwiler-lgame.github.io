<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA BLASTER — ARCADE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-cyan: #00fff5;
    --neon-pink: #ff0080;
    --neon-yellow: #ffff00;
    --neon-green: #00ff88;
    --dark: #010510;
    --mid-dark: #040d25;
    --glow-cyan: 0 0 10px #00fff5, 0 0 30px #00fff580, 0 0 60px #00fff530;
    --glow-pink: 0 0 10px #ff0080, 0 0 30px #ff008080, 0 0 60px #ff008030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
    position: relative;
  }

  /* Star field background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #game-wrapper {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .title-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
    letter-spacing: 4px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: var(--glow-cyan); }
    50% { text-shadow: 0 0 20px #00fff5, 0 0 60px #00fff5, 0 0 100px #00fff5; }
  }

  .subtitle {
    font-size: 8px;
    color: var(--neon-pink);
    text-shadow: var(--glow-pink);
    letter-spacing: 8px;
    text-align: center;
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    width: 600px;
    padding: 8px 16px;
    background: rgba(0,255,245,0.05);
    border: 1px solid var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,255,245,0.2), inset 0 0 15px rgba(0,255,245,0.05);
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: center;
  }

  .hud-label {
    font-size: 6px;
    color: rgba(0,255,245,0.6);
    letter-spacing: 2px;
  }

  .hud-value {
    font-size: 14px;
    color: var(--neon-cyan);
    text-shadow: var(--glow-cyan);
  }

  #lives-display { color: var(--neon-pink); text-shadow: var(--glow-pink); font-size: 16px; }
  #level-display { color: var(--neon-yellow); text-shadow: 0 0 10px #ffff00, 0 0 30px #ffff0080; }

  /* Canvas */
  #gameCanvas {
    border: 2px solid var(--neon-cyan);
    box-shadow: var(--glow-cyan), inset 0 0 60px rgba(0,0,20,0.8);
    display: block;
    image-rendering: pixelated;
    background: var(--mid-dark);
  }

  /* Controls hint */
  .controls {
    display: flex;
    gap: 24px;
    font-size: 7px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
  }

  .key {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 2px 6px;
    color: var(--neon-green);
    text-shadow: 0 0 8px var(--neon-green);
  }

  /* Overlay screens */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(1,5,16,0.92);
    gap: 24px;
    z-index: 20;
  }

  #overlay.hidden { display: none; }

  .overlay-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 36px;
    text-align: center;
    line-height: 1.2;
  }

  .overlay-title.cyan { color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
  .overlay-title.pink { color: var(--neon-pink); text-shadow: var(--glow-pink); }

  .overlay-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 3px;
    text-align: center;
    line-height: 2;
  }

  .start-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 16px 32px;
    background: transparent;
    color: var(--neon-green);
    border: 2px solid var(--neon-green);
    box-shadow: 0 0 15px rgba(0,255,136,0.4), inset 0 0 15px rgba(0,255,136,0.1);
    cursor: pointer;
    text-shadow: 0 0 10px var(--neon-green);
    transition: all 0.15s;
    animation: btnPulse 1.5s ease-in-out infinite;
    letter-spacing: 2px;
  }

  .start-btn:hover {
    background: rgba(0,255,136,0.15);
    box-shadow: 0 0 30px rgba(0,255,136,0.7), inset 0 0 20px rgba(0,255,136,0.2);
    transform: scale(1.05);
  }

  @keyframes btnPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .score-result {
    font-size: 11px;
    color: var(--neon-yellow);
    text-shadow: 0 0 15px #ffff00;
    text-align: center;
    line-height: 2.5;
  }

  /* Touch controls */
  .touch-controls {
    display: none;
    gap: 12px;
    margin-top: 8px;
  }

  @media (max-width: 700px) {
    .touch-controls { display: flex; }
    #gameCanvas { width: 340px; height: 510px; }
    .hud { width: 340px; }
    h1 { font-size: 16px; }
  }

  .touch-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    width: 60px; height: 60px;
    background: rgba(0,255,245,0.1);
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,255,245,0.3);
    border-radius: 4px;
    touch-action: none;
  }

  .touch-btn:active { background: rgba(0,255,245,0.25); }
  .fire-btn {
    background: rgba(255,0,128,0.1) !important;
    border-color: var(--neon-pink) !important;
    color: var(--neon-pink) !important;
    box-shadow: 0 0 10px rgba(255,0,128,0.3) !important;
    width: 80px !important;
  }
</style>
</head>
<body>

<canvas class="stars" id="stars"></canvas>
<div class="scanlines"></div>

<div id="game-wrapper">
  <div class="title-bar">
    <h1>★ NOVA BLASTER ★</h1>
  </div>
  <div class="subtitle">INSERT COIN — PRESS START</div>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">SCORE</span>
      <span class="hud-value" id="score-display">000000</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LIVES</span>
      <span class="hud-value" id="lives-display">♥♥♥</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="level-display">01</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">HI-SCORE</span>
      <span class="hud-value" id="hi-score-display">000000</span>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="gameCanvas" width="600" height="500"></canvas>
    <div id="overlay">
      <div class="overlay-title cyan">NOVA<br>BLASTER</div>
      <div class="overlay-sub">Destroy all enemies • Survive the waves<br>Collect stars for bonus</div>
      <button class="start-btn" id="startBtn">► START GAME</button>
      <div class="controls" style="color:rgba(255,255,255,0.5); margin-top:4px;">
        <span><span class="key">←→</span> MOVE</span>
        <span><span class="key">SPACE</span> SHOOT</span>
        <span><span class="key">P</span> PAUSE</span>
      </div>
    </div>
  </div>

  <div class="touch-controls">
    <button class="touch-btn" id="leftBtn">◄</button>
    <button class="touch-btn fire-btn" id="fireBtn">FIRE</button>
    <button class="touch-btn" id="rightBtn">►</button>
  </div>

  <div class="controls">
    <span><span class="key">← →</span> MOVE</span>
    <span><span class="key">SPACE</span> SHOOT</span>
    <span><span class="key">P</span> PAUSE</span>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// STAR BACKGROUND
// ═══════════════════════════════════════════
const starsCanvas = document.getElementById('stars');
const sc = starsCanvas.getContext('2d');
starsCanvas.width = window.innerWidth;
starsCanvas.height = window.innerHeight;

const stars = Array.from({length: 200}, () => ({
  x: Math.random() * starsCanvas.width,
  y: Math.random() * starsCanvas.height,
  r: Math.random() * 1.5,
  speed: Math.random() * 0.5 + 0.1,
  brightness: Math.random()
}));

function animateStars() {
  sc.clearRect(0, 0, starsCanvas.width, starsCanvas.height);
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > starsCanvas.height) s.y = 0;
    s.brightness += 0.02;
    const alpha = 0.4 + Math.sin(s.brightness) * 0.3;
    sc.beginPath();
    sc.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sc.fillStyle = `rgba(200,220,255,${alpha})`;
    sc.fill();
  });
  requestAnimationFrame(animateStars);
}
animateStars();

// ═══════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let gameState = 'menu'; // menu, playing, paused, dead, gameover, levelup
let score = 0, hiScore = 0, lives = 3, level = 1;
let animFrame;

// Player
const player = {
  x: W/2, y: H - 70, w: 36, h: 36,
  speed: 5, shootCooldown: 0, invincible: 0,
  thruster: 0
};

// Game objects
let bullets = [], enemyBullets = [], enemies = [], particles = [], powerups = [], explosions = [];
let keys = {}, touchLeft = false, touchRight = false, touchFire = false;
let waveTimer = 0, waveActive = false, levelupTimer = 0;
let bossAlive = false, boss = null;
let bgScrollY = 0;

// Enemy types
const ENEMY_TYPES = [
  { color: '#ff4444', hp: 1, score: 100, size: 22, speed: 1.2, shootRate: 180, shape: 'basic' },
  { color: '#ff8800', hp: 2, score: 200, size: 26, speed: 0.9, shootRate: 120, shape: 'tank' },
  { color: '#aa00ff', hp: 1, score: 150, size: 18, speed: 2.2, shootRate: 200, shape: 'fast' },
  { color: '#00ffaa', hp: 3, score: 300, size: 30, speed: 0.7, shootRate: 90,  shape: 'armored' },
];

function resetGame() {
  score = 0; lives = 3; level = 1;
  bullets = []; enemyBullets = []; enemies = []; particles = []; powerups = []; explosions = [];
  player.x = W/2; player.y = H - 70;
  player.shootCooldown = 0; player.invincible = 0;
  bossAlive = false; boss = null;
  spawnWave();
  updateHUD();
}

// ═══════════════════════════════════════════
// WAVE SPAWNING
// ═══════════════════════════════════════════
function spawnWave() {
  waveActive = true;
  const count = 5 + level * 2;
  const cols = Math.min(8, Math.ceil(Math.sqrt(count)));
  const rows = Math.ceil(count / cols);
  let placed = 0;

  for (let r = 0; r < rows && placed < count; r++) {
    for (let c = 0; c < cols && placed < count; c++) {
      const typeIdx = Math.min(Math.floor(Math.random() * Math.min(level, ENEMY_TYPES.length)), ENEMY_TYPES.length - 1);
      const t = ENEMY_TYPES[typeIdx];
      enemies.push({
        x: 60 + c * (W - 120) / (cols - 1 || 1),
        y: 40 + r * 55,
        ...JSON.parse(JSON.stringify(t)),
        dx: (Math.random() - 0.5) * 1.5 * (1 + level * 0.1),
        shootTimer: Math.floor(Math.random() * t.shootRate),
        wobble: Math.random() * Math.PI * 2,
        alive: true
      });
      placed++;
    }
  }

  // Boss every 3 levels
  if (level % 3 === 0) spawnBoss();
}

function spawnBoss() {
  bossAlive = true;
  boss = {
    x: W/2, y: 80, w: 80, h: 60,
    hp: 20 + level * 5, maxHp: 20 + level * 5,
    dx: 1.5, dy: 0,
    phase: 0, phaseTimer: 0,
    shootTimer: 0, shootRate: 60,
    alive: true
  };
}

// ═══════════════════════════════════════════
// DRAW FUNCTIONS
// ═══════════════════════════════════════════
function drawPlayer() {
  const x = player.x, y = player.y;
  if (player.invincible > 0 && Math.floor(player.invincible / 5) % 2 === 0) return;

  ctx.save();
  ctx.translate(x, y);

  // Thruster flame
  player.thruster = (player.thruster + 0.3) % (Math.PI * 2);
  const flameH = 10 + Math.sin(player.thruster) * 6;
  const grad = ctx.createLinearGradient(0, 10, 0, 10 + flameH);
  grad.addColorStop(0, '#00fff5');
  grad.addColorStop(0.5, '#ff0080');
  grad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.moveTo(-8, 10); ctx.lineTo(0, 10 + flameH); ctx.lineTo(8, 10);
  ctx.fillStyle = grad; ctx.fill();

  // Ship body
  ctx.shadowBlur = 20; ctx.shadowColor = '#00fff5';
  ctx.fillStyle = '#00fff5';
  ctx.beginPath();
  ctx.moveTo(0, -18); ctx.lineTo(14, 12); ctx.lineTo(6, 8); ctx.lineTo(0, 10); ctx.lineTo(-6, 8); ctx.lineTo(-14, 12);
  ctx.closePath(); ctx.fill();

  // Cockpit
  ctx.fillStyle = '#001133';
  ctx.beginPath(); ctx.ellipse(0, -2, 5, 8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,255,245,0.6)';
  ctx.beginPath(); ctx.ellipse(0, -2, 3, 5, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  e.wobble += 0.05;
  ctx.translate(Math.sin(e.wobble) * 3, 0);

  ctx.shadowBlur = 15; ctx.shadowColor = e.color;
  ctx.fillStyle = e.color;

  if (e.shape === 'basic') {
    ctx.beginPath();
    ctx.moveTo(0, -e.size/2); ctx.lineTo(e.size/2, e.size/2); ctx.lineTo(0, e.size/3); ctx.lineTo(-e.size/2, e.size/2);
    ctx.closePath(); ctx.fill();
  } else if (e.shape === 'tank') {
    ctx.fillRect(-e.size/2, -e.size/2, e.size, e.size);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-e.size/3, -e.size/3, e.size*2/3, e.size*2/3);
  } else if (e.shape === 'fast') {
    ctx.beginPath();
    ctx.moveTo(0, -e.size); ctx.lineTo(e.size/2, e.size/2); ctx.lineTo(0, 0); ctx.lineTo(-e.size/2, e.size/2);
    ctx.closePath(); ctx.fill();
  } else {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      const r = i % 2 === 0 ? e.size/2 : e.size/3;
      i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill();
  }

  // HP bar
  if (e.hp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(-e.size/2, -e.size/2 - 8, e.size, 5);
    ctx.fillStyle = e.color; ctx.fillRect(-e.size/2, -e.size/2 - 8, e.size * (e.hp / (e.hp + 1)), 5);
  }
  ctx.restore();
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  const pulse = Math.sin(Date.now() / 200) * 5;
  ctx.shadowBlur = 30 + pulse; ctx.shadowColor = '#ff0080';

  // Body
  ctx.fillStyle = '#cc0066';
  ctx.beginPath(); ctx.ellipse(0, 0, boss.w/2, boss.h/2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff0080';
  ctx.beginPath(); ctx.ellipse(0, 0, boss.w/3, boss.h/3, 0, 0, Math.PI * 2); ctx.fill();

  // Eye
  ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00';
  ctx.beginPath(); ctx.arc(0, -5, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(0, -5, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(3, -8, 3, 0, Math.PI * 2); ctx.fill();

  // HP bar
  const bw = 160;
  ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(-bw/2, boss.h/2 + 8, bw, 10);
  ctx.fillStyle = `hsl(${(boss.hp/boss.maxHp)*120}, 100%, 50%)`;
  ctx.fillRect(-bw/2, boss.h/2 + 8, bw * (boss.hp / boss.maxHp), 10);
  ctx.fillStyle = '#fff'; ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center'; ctx.fillText('BOSS', 0, boss.h/2 + 6);

  ctx.restore();
}

function drawBullet(b, isEnemy) {
  ctx.save();
  ctx.shadowBlur = 12;
  if (isEnemy) {
    ctx.shadowColor = '#ff4400'; ctx.fillStyle = '#ff4400';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff8800';
    ctx.beginPath(); ctx.arc(b.x, b.y, 2, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.shadowColor = '#00fff5'; ctx.fillStyle = '#00fff5';
    ctx.fillRect(b.x - 2, b.y - 8, 4, 12);
    ctx.fillStyle = '#ffffff'; ctx.fillRect(b.x - 1, b.y - 6, 2, 6);
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.shadowBlur = 10; ctx.shadowColor = p.color;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (p.life / p.maxLife), 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

function drawPowerups() {
  powerups.forEach(p => {
    ctx.save();
    ctx.translate(p.x, p.y);
    p.rot = (p.rot || 0) + 0.05;
    ctx.rotate(p.rot);
    ctx.shadowBlur = 20; ctx.shadowColor = '#ffff00';
    ctx.fillStyle = '#ffff00';
    ctx.font = '18px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(p.type === 'life' ? '♥' : '★', 0, 0);
    ctx.restore();
  });
}

// ═══════════════════════════════════════════
// PARTICLES & EXPLOSIONS
// ═══════════════════════════════════════════
function explode(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 4,
      color,
      life: 30 + Math.random() * 20,
      maxLife: 50
    });
  }
}

// ═══════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════
function update() {
  if (gameState !== 'playing') return;

  bgScrollY = (bgScrollY + 1) % H;

  // Player movement
  const movL = keys['ArrowLeft'] || keys['a'] || touchLeft;
  const movR = keys['ArrowRight'] || keys['d'] || touchRight;
  if (movL && player.x > player.w/2) player.x -= player.speed;
  if (movR && player.x < W - player.w/2) player.x += player.speed;

  // Player shooting
  player.shootCooldown--;
  const shooting = keys[' '] || touchFire;
  if (shooting && player.shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - 20, dy: -9 });
    if (level >= 3) bullets.push({ x: player.x - 10, y: player.y - 10, dy: -9 });
    if (level >= 5) bullets.push({ x: player.x + 10, y: player.y - 10, dy: -9 });
    player.shootCooldown = 12;
  }

  if (player.invincible > 0) player.invincible--;

  // Move bullets
  bullets = bullets.filter(b => {
    b.y += b.dy;
    return b.y > -10;
  });

  // Move enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += (b.dx || 0); b.y += b.dy;
    return b.y < H + 10 && b.x > -10 && b.x < W + 10;
  });

  // Update enemies
  enemies.forEach(e => {
    e.x += e.dx;
    if (e.x < e.size || e.x > W - e.size) e.dx *= -1;
    e.y += Math.sin(e.wobble * 0.5) * 0.3;

    // Enemy shooting
    e.shootTimer--;
    if (e.shootTimer <= 0) {
      e.shootTimer = e.shootRate - level * 5;
      if (Math.random() < 0.4) {
        const angle = Math.atan2(player.y - e.y, player.x - e.x);
        enemyBullets.push({ x: e.x, y: e.y + e.size/2, dx: Math.cos(angle) * 2, dy: Math.sin(angle) * 3 + 1 });
      }
    }
  });

  // Boss logic
  if (boss && boss.alive) {
    boss.x += boss.dx;
    boss.phaseTimer++;
    if (boss.x < boss.w/2 || boss.x > W - boss.w/2) boss.dx *= -1;
    if (boss.phaseTimer > 120) {
      boss.phaseTimer = 0;
      boss.phase = (boss.phase + 1) % 3;
    }

    boss.shootTimer--;
    if (boss.shootTimer <= 0) {
      boss.shootTimer = boss.shootRate;
      // Burst pattern
      const patterns = [
        [[0, 4]], // straight
        [[-0.3, 4], [0, 4], [0.3, 4]], // spread
        [[-0.5,3],[-0.25,3],[0,4],[0.25,3],[0.5,3]], // fan
      ];
      const pat = patterns[boss.phase];
      pat.forEach(([dx, dy]) => {
        enemyBullets.push({ x: boss.x, y: boss.y + boss.h/2 + 10, dx, dy });
      });
    }
  }

  // Bullet vs enemy collisions
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (Math.hypot(b.x - e.x, b.y - e.y) < e.size) {
        b.hit = true; e.hp--;
        explode(e.x, e.y, e.color, 4);
        if (e.hp <= 0) {
          e.alive = false; b.hit = true;
          explode(e.x, e.y, e.color, 16);
          score += e.score * level;
          if (Math.random() < 0.08) powerups.push({ x: e.x, y: e.y, dy: 1.5, type: 'star', rot: 0 });
          if (Math.random() < 0.03) powerups.push({ x: e.x, y: e.y, dy: 1.5, type: 'life', rot: 0 });
        }
      }
    });

    if (boss && boss.alive && Math.hypot(b.x - boss.x, b.y - boss.y) < boss.w/2) {
      b.hit = true; boss.hp--;
      explode(boss.x + (Math.random()-0.5)*40, boss.y + (Math.random()-0.5)*30, '#ff0080', 5);
      if (boss.hp <= 0) {
        boss.alive = false; bossAlive = false;
        explode(boss.x, boss.y, '#ff0080', 40);
        explode(boss.x, boss.y, '#ffff00', 30);
        score += 5000 * level;
      }
    }
  });

  bullets = bullets.filter(b => !b.hit);
  enemies = enemies.filter(e => e.alive);

  // Enemy bullet vs player
  if (player.invincible <= 0) {
    enemyBullets.forEach(b => {
      if (Math.hypot(b.x - player.x, b.y - player.y) < 18) {
        b.gone = true;
        playerHit();
      }
    });
    enemyBullets = enemyBullets.filter(b => !b.gone);
  }

  // Enemies reach bottom
  enemies.forEach(e => {
    if (e.y > H - 40) {
      e.alive = false;
      playerHit();
    }
  });
  enemies = enemies.filter(e => e.alive);

  // Powerups
  powerups = powerups.filter(p => {
    p.y += p.dy;
    if (Math.hypot(p.x - player.x, p.y - player.y) < 24) {
      if (p.type === 'life' && lives < 5) { lives++; explode(p.x, p.y, '#ff0080', 10); }
      if (p.type === 'star') { score += 500 * level; explode(p.x, p.y, '#ffff00', 10); }
      updateHUD(); return false;
    }
    return p.y < H + 20;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    return p.life > 0;
  });

  // Next wave?
  if (enemies.length === 0 && !bossAlive) {
    level++;
    gameState = 'levelup';
    levelupTimer = 120;
  }

  updateHUD();
}

function playerHit() {
  lives--;
  player.invincible = 120;
  explode(player.x, player.y, '#00fff5', 20);
  updateHUD();
  if (lives <= 0) {
    gameState = 'gameover';
    if (score > hiScore) hiScore = score;
    showGameOver();
  }
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  ctx.clearRect(0, 0, W, H);

  // Grid lines (retro feel)
  ctx.strokeStyle = 'rgba(0,80,120,0.12)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = bgScrollY % 40; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  drawParticles();
  drawPowerups();
  bullets.forEach(b => drawBullet(b, false));
  enemyBullets.forEach(b => drawBullet(b, true));
  enemies.forEach(e => drawEnemy(e));
  if (boss && boss.alive) drawBoss();
  if (gameState === 'playing' || gameState === 'levelup') drawPlayer();

  if (gameState === 'levelup') {
    levelupTimer--;
    ctx.save();
    ctx.globalAlpha = Math.sin(levelupTimer / 20) * 0.5 + 0.5;
    ctx.fillStyle = '#ffff00';
    ctx.shadowBlur = 30; ctx.shadowColor = '#ffff00';
    ctx.font = '20px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level} CLEAR!`, W/2, H/2 - 20);
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText(`NEXT WAVE...`, W/2, H/2 + 20);
    ctx.restore();

    if (levelupTimer <= 0) {
      gameState = 'playing';
      spawnWave();
    }
  }

  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,20,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00fff5'; ctx.shadowBlur = 20; ctx.shadowColor = '#00fff5';
    ctx.font = '22px "Press Start 2P"'; ctx.textAlign = 'center';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '8px "Press Start 2P"'; ctx.fillStyle = '#fff';
    ctx.fillText('PRESS P TO RESUME', W/2, H/2 + 40);
  }
}

// ═══════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-display').textContent = String(score).padStart(6, '0');
  document.getElementById('hi-score-display').textContent = String(Math.max(score, hiScore)).padStart(6, '0');
  document.getElementById('lives-display').textContent = '♥'.repeat(Math.max(0, lives));
  document.getElementById('level-display').textContent = String(level).padStart(2, '0');
}

// ═══════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

function showGameOver() {
  overlay.innerHTML = `
    <div class="overlay-title pink">GAME<br>OVER</div>
    <div class="score-result">
      SCORE: ${String(score).padStart(6,'0')}<br>
      HI-SCORE: ${String(Math.max(score,hiScore)).padStart(6,'0')}<br>
      LEVEL: ${String(level).padStart(2,'0')}
    </div>
    <button class="start-btn" id="startBtn">► PLAY AGAIN</button>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('startBtn').addEventListener('click', startGame);
}

function startGame() {
  overlay.classList.add('hidden');
  resetGame();
  gameState = 'playing';
}

startBtn.addEventListener('click', startGame);

// ═══════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
function setupTouch(id, setTrue, setFalse) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('pointerdown', () => setTrue(true));
  btn.addEventListener('pointerup', () => setTrue(false));
  btn.addEventListener('pointerleave', () => setTrue(false));
}
setupTouch('leftBtn', v => touchLeft = v);
setupTouch('rightBtn', v => touchRight = v);
setupTouch('fireBtn', v => touchFire = v);

// ═══════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
updateHUD();
</script>
</body>
