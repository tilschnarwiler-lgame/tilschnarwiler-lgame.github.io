<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tower Defense</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 780px; height: 620px; overflow: hidden; background: #111; }
#wrapper { display: flex; width: 780px; height: 620px; }
#sidebar { width: 180px; min-width: 180px; height: 620px; background: #1a1a1a; border-right: 2px solid #333; display: flex; flex-direction: column; padding: 10px 8px; gap: 7px; overflow-y: auto; font-family: 'Segoe UI', sans-serif; }
canvas { display: block; width: 600px; height: 620px; min-width: 600px; max-width: 600px; flex-shrink: 0; }
.s-title { color: #aaa; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 2px 4px; border-bottom: 1px solid #333; margin-bottom: 1px; font-family: 'Segoe UI', sans-serif; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 2px 4px; }
.stat-label { color: #888; font-size: 11px; font-family: 'Segoe UI', sans-serif; }
.stat-val { color: #fff; font-size: 13px; font-weight: bold; font-family: 'Segoe UI', sans-serif; }
.stat-val.gold { color: #f1c40f; }
.hp-bar-wrap { padding: 2px 4px; }
.hp-bar-bg { background: #333; border-radius: 3px; height: 10px; width: 100%; }
.hp-bar-fill { height: 10px; border-radius: 3px; transition: width 0.2s; }
.tbtn { width: 100%; padding: 6px; border: none; border-radius: 5px; cursor: pointer; font-size: 11px; font-weight: bold; text-align: left; display: flex; flex-direction: column; gap: 1px; font-family: 'Segoe UI', sans-serif; }
.tbtn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.6); }
.tbtn .btn-name { font-size: 12px; }
.tbtn .btn-cost { font-size: 10px; opacity: 0.8; }
.tbtn .btn-desc { font-size: 9px; opacity: 0.65; font-weight: normal; }
.tbtn.archer { background: #2d6a2d; color: #a8f0a8; border: 1px solid #4a9a4a; }
.tbtn.archer.active { background: #4a9a4a; box-shadow: 0 0 8px #4a9a4a88; }
.tbtn.cannon { background: #6a3a1a; color: #f0c898; border: 1px solid #a05a28; }
.tbtn.cannon.active { background: #a05a28; box-shadow: 0 0 8px #a05a2888; }
.tbtn.mage { background: #3a1a6a; color: #c898f0; border: 1px solid #6a28a0; }
.tbtn.mage.active { background: #6a28a0; box-shadow: 0 0 8px #6a28a088; }
.wave-btn { width: 100%; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; background: #8b1a1a; color: #ffaaaa; border: 1px solid #cc3333; font-family: 'Segoe UI', sans-serif; }
.wave-btn:hover:not(:disabled) { background: #cc2222; }
.wave-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.divider { height: 1px; background: #2a2a2a; margin: 1px 0; }
#upgPanel { display: none; background: #222; border: 1px solid #555; border-radius: 6px; padding: 8px; margin-top: 2px; }
#upgPanel .upg-title { color: #fff; font-size: 12px; font-weight: bold; margin-bottom: 4px; font-family: 'Segoe UI', sans-serif; }
#upgPanel .upg-stat { color: #aaa; font-size: 11px; font-family: 'Segoe UI', sans-serif; }
#upgPanel .upg-info { color: #f1c40f; font-size: 10px; margin-top: 4px; border-top: 1px solid #333; padding-top: 4px; font-family: 'Segoe UI', sans-serif; }
#upgPanel .upg-btn { margin-top: 5px; width: 100%; padding: 5px; background: #3a3a00; color: #f1c40f; border: 1px solid #888800; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; font-family: 'Segoe UI', sans-serif; }
#upgPanel .upg-btn:hover:not(:disabled) { background: #555500; }
#upgPanel .upg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#upgPanel .upg-done { color: #888; font-size: 10px; margin-top: 4px; border-top: 1px solid #333; padding-top: 4px; font-family: 'Segoe UI', sans-serif; }
#upgPanel .close-btn { float: right; background: none; border: none; color: #888; cursor: pointer; font-size: 14px; line-height: 1; }
</style>
</head>
<body>
<div id="wrapper">
  <div id="sidebar">
    <div class="s-title">Status</div>
    <div class="hp-bar-wrap">
      <div style="color:#aaa;font-size:10px;margin-bottom:3px;font-family:'Segoe UI',sans-serif;">Rathaus HP</div>
      <div class="hp-bar-bg"><div class="hp-bar-fill" id="hpBar" style="width:100%;background:#27ae60;"></div></div>
      <div style="color:#fff;font-size:10px;text-align:right;margin-top:1px;font-family:'Segoe UI',sans-serif;" id="hpText">100 / 100</div>
    </div>
    <div class="stat-row"><span class="stat-label">Gold</span><span class="stat-val gold" id="goldText">160</span></div>
    <div class="stat-row"><span class="stat-label">Welle</span><span class="stat-val" id="waveText">—</span></div>
    <div class="divider"></div>
    <div class="s-title">Türme bauen</div>
    <button class="tbtn archer" id="btnArcher">
      <span class="btn-name">Bogenschütze</span>
      <span class="btn-cost">80 Gold</span>
      <span class="btn-desc">2 Schaden · mittl. Reichw.</span>
    </button>
    <button class="tbtn cannon" id="btnCannon">
      <span class="btn-name">Kanonenturm</span>
      <span class="btn-cost">120 Gold</span>
      <span class="btn-desc">5 Schaden · langsam</span>
    </button>
    <button class="tbtn mage" id="btnMage">
      <span class="btn-name">Magierturm</span>
      <span class="btn-cost">160 Gold</span>
      <span class="btn-desc">3 Flächenschaden</span>
    </button>
    <div class="divider"></div>
    <div id="upgPanel">
      <button class="close-btn" id="upgClose">✕</button>
      <div class="upg-title" id="upgTitle">Turm</div>
      <div class="upg-stat" id="upgStats"></div>
      <div id="upgBottom"></div>
    </div>
    <div class="divider"></div>
    <button class="wave-btn" id="waveBtn">Welle 1 starten</button>
    <div class="divider"></div>
    <div class="s-title" style="font-size:9px;line-height:1.5;">Klick auf Turm → Upgrade<br>Klick auf Baum/Busch → Entfernen</div>
  </div>
  <canvas id="game" width="600" height="620"></canvas>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GS=40,COLS=15,ROWS=15,CX=7,CY=7;
let baseHP=100,money=160,gameOver=false;
let enemies=[],towers=[],arrows=[],particles=[],explosions=[];
let buildMode=null,msg='',msgTimer=0,popup=null,selectedTower=null;
let wave=0,enemiesToSpawn=0,spawnTimer=0,phase='prep';

const TOWER_DEFS={
  archer:{cost:80,range:145,cooldown:48,dmg:2,color:'#4a9a4a',label:'Bogenschütze'},
  cannon:{cost:120,range:160,cooldown:96,dmg:5,color:'#a05a28',label:'Kanonenturm'},
  mage:{cost:160,range:130,cooldown:96,dmg:3,color:'#8a28c0',label:'Magierturm',splash:55}
};
const UPGRADE_DEFS={
  archer:{cost:40,rangeBonus:0.20,dmgBonus:1,label:'+20% Reichw., +1 Schaden'},
  cannon:{cost:80,rangeBonus:0.10,dmgBonus:2,label:'+10% Reichw., +2 Schaden'},
  mage:{cost:100,rangeBonus:0.20,dmgBonus:2,label:'+20% Reichw., +2 Schaden'}
};

const terrain=[];
(function(){
  for(let y=0;y<ROWS;y++){terrain[y]=[];for(let x=0;x<COLS;x++){
    if(x===CX&&y===CY){terrain[y][x]=0;continue;}
    const r=Math.random();terrain[y][x]=r<0.55?0:r<0.70?1:r<0.88?2:3;
  }}
})();
const grid=Array.from({length:ROWS},()=>Array(COLS).fill(null));

function waveEnemyCount(w){return w<=5?3+w:6+w*2;}

function startWave(){
  wave++;enemiesToSpawn=0;spawnTimer=45;phase='wave';buildMode=null;selectedTower=null;
  hideUpgPanel();
  const total=waveEnemyCount(wave);
  const heavyAllowed=wave>=10;
  const heavyCount=heavyAllowed?Math.floor(total*0.35):0;
  const lightCount=total-heavyCount;
  window._spawnQ=[];
  for(let i=0;i<lightCount;i++)window._spawnQ.push('light');
  for(let i=0;i<heavyCount;i++)window._spawnQ.push('heavy');
  window._spawnQ.sort(()=>Math.random()-0.5);
  enemiesToSpawn=window._spawnQ.length;
  updateUI();
}

function spawnEnemy(){
  if(!window._spawnQ||!window._spawnQ.length)return;
  const type=window._spawnQ.shift();
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=0;y=Math.floor(Math.random()*ROWS);}
  else if(side===1){x=COLS-1;y=Math.floor(Math.random()*ROWS);}
  else if(side===2){x=Math.floor(Math.random()*COLS);y=0;}
  else{x=Math.floor(Math.random()*COLS);y=ROWS-1;}
  if(type==='heavy'){
    enemies.push({x,y,hp:20,maxHp:20,speed:0.018+wave*0.001,color:'#8a0000',angle:0,type:'heavy',dmg:5});
  } else {
    const cols=['#8B3a3a','#4a5a00','#1a3a3a','#2c2c5e','#5a3a1a'];
    enemies.push({x,y,hp:5,maxHp:5,speed:0.030+wave*0.002,color:cols[Math.floor(Math.random()*cols.length)],angle:0,type:'light',dmg:1});
  }
}

function killEnemy(en){
  spawnFx(en.x*GS+GS/2,en.y*GS+GS/2,'#c0392b',10);
  money+=en.type==='heavy'?20:5;
  enemies=enemies.filter(e=>e!==en);
  updateUI();
}

function showMsg(t){msg=t;msgTimer=130;}
function spawnFx(px,py,col,n){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1+Math.random()*2;particles.push({x:px,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30,col});}
}
function getMouse(e){
  const r=canvas.getBoundingClientRect();
  return{x:(e.clientX-r.left)*(600/r.width),y:(e.clientY-r.top)*(620/r.height)};
}

function showUpgPanel(tw){
  selectedTower=tw;
  const def=TOWER_DEFS[tw.type],upd=UPGRADE_DEFS[tw.type];
  document.getElementById('upgTitle').textContent=(tw.upgraded?'★ ':'')+def.label;
  document.getElementById('upgStats').innerHTML='Schaden: '+tw.dmg+'<br>Reichweite: '+Math.round(tw.range);
  const bot=document.getElementById('upgBottom');
  if(!tw.upgraded){
    bot.innerHTML='<div class="upg-info">Upgrade ('+upd.cost+'G):<br>'+upd.label+'</div>'+
      '<button class="upg-btn" id="doUpgBtn"'+(money<upd.cost?' disabled':'')+'>Upgrade kaufen</button>';
    document.getElementById('doUpgBtn').onclick=doUpgrade;
  } else {
    bot.innerHTML='<div class="upg-done">Bereits aufgewertet ✓</div>';
  }
  document.getElementById('upgPanel').style.display='block';
}

function hideUpgPanel(){selectedTower=null;document.getElementById('upgPanel').style.display='none';}

function doUpgrade(){
  if(!selectedTower)return;
  const tw=selectedTower,upd=UPGRADE_DEFS[tw.type];
  if(tw.upgraded||money<upd.cost)return;
  money-=upd.cost;tw.range=Math.round(tw.range*(1+upd.rangeBonus));tw.dmg+=upd.dmgBonus;tw.upgraded=true;
  showMsg('Turm aufgewertet!');showUpgPanel(tw);updateUI();
}

document.getElementById('upgClose').onclick=hideUpgPanel;

function updateUI(){
  const canBuild=phase!=='wave';
  ['Archer','Cannon','Mage'].forEach(n=>{
    const k=n.toLowerCase(),b=document.getElementById('btn'+n);
    b.disabled=money<TOWER_DEFS[k].cost||!canBuild;
    b.classList.toggle('active',buildMode===k);
  });
  const wb=document.getElementById('waveBtn');
  wb.disabled=phase==='wave';
  wb.textContent=wave===0?'Welle 1 starten':'Nächste Welle ('+(wave+1)+')';
  document.getElementById('goldText').textContent=money;
  document.getElementById('waveText').textContent=wave||'—';
  const ratio=Math.max(0,baseHP/100);
  document.getElementById('hpBar').style.width=(ratio*100)+'%';
  document.getElementById('hpBar').style.background=ratio>0.5?'#27ae60':ratio>0.25?'#e67e22':'#e74c3c';
  document.getElementById('hpText').textContent=baseHP+' / 100';
  const btn=document.getElementById('doUpgBtn');
  if(btn&&selectedTower)btn.disabled=money<UPGRADE_DEFS[selectedTower.type].cost;
}

document.getElementById('btnArcher').onclick=()=>{if(!document.getElementById('btnArcher').disabled){buildMode=buildMode==='archer'?null:'archer';hideUpgPanel();updateUI();}};
document.getElementById('btnCannon').onclick=()=>{if(!document.getElementById('btnCannon').disabled){buildMode=buildMode==='cannon'?null:'cannon';hideUpgPanel();updateUI();}};
document.getElementById('btnMage').onclick=()=>{if(!document.getElementById('btnMage').disabled){buildMode=buildMode==='mage'?null:'mage';hideUpgPanel();updateUI();}};
document.getElementById('waveBtn').onclick=()=>{if(phase==='prep')startWave();};

canvas.addEventListener('click',e=>{
  const{x:mx,y:my}=getMouse(e);
  if(gameOver){if(mx>150&&mx<450&&my>310&&my<365)location.reload();return;}
  if(popup){
    const{bx,by}=popup;
    if(mx>bx&&mx<bx+192&&my>by&&my<by+40){
      const cost=popup.type===2?40:20;
      if(money>=cost){money-=cost;terrain[popup.gy][popup.gx]=0;showMsg('Entfernt!');}
      else showMsg('Nicht genug Gold!');
    }
    popup=null;updateUI();return;
  }
  const gx=Math.floor(mx/GS),gy=Math.floor(my/GS);
  if(gx<0||gx>=COLS||gy<0||gy>=ROWS){buildMode=null;hideUpgPanel();updateUI();return;}
  const existingTower=towers.find(t=>t.x===gx&&t.y===gy);
  if(existingTower&&!buildMode){showUpgPanel(existingTower);return;}
  const t=terrain[gy][gx];
  if(!buildMode&&(t===1||t===2)){
    let bx=mx+6,by=my-46;
    if(bx+192>600)bx=600-194;if(by<4)by=my+8;
    popup={gx,gy,type:t,bx,by};return;
  }
  if(buildMode){
    if(gx===CX&&gy===CY||terrain[gy][gx]!==0||grid[gy][gx]!==null){showMsg('Feld besetzt!');return;}
    const def=TOWER_DEFS[buildMode];
    if(money<def.cost){showMsg('Nicht genug Gold!');return;}
    money-=def.cost;grid[gy][gx]=true;
    towers.push({x:gx,y:gy,cooldown:0,type:buildMode,upgraded:false,range:def.range,dmg:def.dmg,cd:def.cooldown});
    buildMode=null;showMsg('Turm gebaut!');updateUI();
  }
});

function update(){
  if(msgTimer>0)msgTimer--;
  if(gameOver)return;
  if(baseHP<=0){gameOver=true;return;}
  if(phase==='wave'){
    if(enemiesToSpawn>0){spawnTimer--;if(spawnTimer<=0){spawnEnemy();enemiesToSpawn--;spawnTimer=Math.max(28-wave*2,10);}}
    else if(enemies.length===0){phase='prep';updateUI();}
  }
  for(let i=enemies.length-1;i>=0;i--){
    const en=enemies[i],ex=en.x*GS+GS/2,ey=en.y*GS+GS/2;
    const bx=CX*GS+GS/2,by=CY*GS+GS/2,dx=bx-ex,dy=by-ey,d=Math.sqrt(dx*dx+dy*dy);
    en.x+=(dx/d)*en.speed;en.y+=(dy/d)*en.speed;en.angle=Math.atan2(dy,dx);
    if(d<16){baseHP-=en.dmg;spawnFx(ex,ey,'#e74c3c',8);enemies.splice(i,1);updateUI();}
  }
  towers.forEach(tw=>{
    if(tw.cooldown>0){tw.cooldown--;return;}
    const tx=tw.x*GS+GS/2,ty=tw.y*GS+GS/2;
    if(tw.type==='mage'){
      let best=null,bestD=tw.range;
      for(const en of enemies){const d=Math.sqrt((en.x*GS+GS/2-tx)**2+(en.y*GS+GS/2-ty)**2);if(d<bestD){bestD=d;best=en;}}
      if(best){arrows.push({x:tx,y:ty,target:best,speed:4,angle:Math.atan2(best.y*GS+GS/2-ty,best.x*GS+GS/2-tx),type:'mage',dmg:tw.dmg,splash:55});tw.cooldown=tw.cd;}
    } else {
      for(const en of enemies){
        const d=Math.sqrt((en.x*GS+GS/2-tx)**2+(en.y*GS+GS/2-ty)**2);
        if(d<tw.range){arrows.push({x:tx,y:ty,target:en,speed:tw.type==='cannon'?3.5:5,angle:Math.atan2(en.y*GS+GS/2-ty,en.x*GS+GS/2-tx),type:tw.type,dmg:tw.dmg});tw.cooldown=tw.cd;break;}
      }
    }
  });
  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];
    if(!a.target||!enemies.includes(a.target)){arrows.splice(i,1);continue;}
    const ex=a.target.x*GS+GS/2,ey=a.target.y*GS+GS/2,dx=ex-a.x,dy=ey-a.y,d=Math.sqrt(dx*dx+dy*dy);
    a.angle=Math.atan2(dy,dx);a.x+=(dx/d)*a.speed;a.y+=(dy/d)*a.speed;
    if(d<10){
      if(a.type==='mage'){
        const sr=a.splash||55;
        explosions.push({x:a.x,y:a.y,r:0,maxR:sr,life:20,type:'mage'});
        for(let j=enemies.length-1;j>=0;j--){
          const en=enemies[j],d2=Math.sqrt((en.x*GS+GS/2-a.x)**2+(en.y*GS+GS/2-a.y)**2);
          if(d2<sr){en.hp-=a.dmg;spawnFx(en.x*GS+GS/2,en.y*GS+GS/2,'#aa44ff',4);if(en.hp<=0)killEnemy(en);}
        }
        arrows.splice(i,1);
      } else if(a.type==='cannon'){
        explosions.push({x:a.x,y:a.y,r:0,maxR:22,life:15,type:'cannon'});
        spawnFx(a.x,a.y,'#e67e22',6);a.target.hp-=a.dmg;
        const dying=a.target.hp<=0?a.target:null;arrows.splice(i,1);if(dying)killEnemy(dying);
      } else {
        a.target.hp-=a.dmg;spawnFx(a.x,a.y,'#c8991a',4);
        const dying=a.target.hp<=0?a.target:null;arrows.splice(i,1);if(dying)killEnemy(dying);
      }
    }
  }
  for(let i=explosions.length-1;i>=0;i--){const ex=explosions[i];ex.r+=ex.maxR/ex.life;ex.life--;if(ex.life<=0)explosions.splice(i,1);}
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;if(p.life<=0)particles.splice(i,1);}
}

function rrect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}
function drawBush(px,py){
  ctx.fillStyle='#1e8449';ctx.beginPath();ctx.arc(px+11,py+23,9,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+23,py+25,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+17,py+17,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#27ae60';ctx.beginPath();ctx.arc(px+14,py+21,5,0,Math.PI*2);ctx.fill();
}
function drawTree(px,py){
  ctx.fillStyle='#5d4037';ctx.fillRect(px+17,py+26,6,14);
  ctx.fillStyle='#145a32';ctx.beginPath();ctx.moveTo(px+20,py+3);ctx.lineTo(px+33,py+20);ctx.lineTo(px+7,py+20);ctx.closePath();ctx.fill();
  ctx.fillStyle='#1e8449';ctx.beginPath();ctx.moveTo(px+20,py+10);ctx.lineTo(px+31,py+25);ctx.lineTo(px+9,py+25);ctx.closePath();ctx.fill();
  ctx.fillStyle='#27ae60';ctx.beginPath();ctx.moveTo(px+20,py+17);ctx.lineTo(px+29,py+30);ctx.lineTo(px+11,py+30);ctx.closePath();ctx.fill();
}
function drawRock(px,py){
  ctx.fillStyle='#607d8b';ctx.beginPath();ctx.ellipse(px+20,py+25,13,10,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#90a4ae';ctx.beginPath();ctx.ellipse(px+16,py+22,7,5,0,0,Math.PI*2);ctx.fill();
}
function drawCastle(px,py){
  ctx.fillStyle='#a89880';ctx.fillRect(px+3,py+12,34,26);ctx.fillStyle='#9e8e7e';
  ctx.fillRect(px+3,py+4,9,12);ctx.fillRect(px+15,py+4,10,12);ctx.fillRect(px+28,py+4,9,12);
  ctx.fillStyle='#7a6a5a';ctx.fillRect(px+5,py+4,5,6);ctx.fillRect(px+17,py+4,6,6);ctx.fillRect(px+30,py+4,5,6);
  ctx.fillStyle='#3d2b1a';ctx.fillRect(px+15,py+24,10,14);
  ctx.fillStyle='#b7410e';ctx.fillRect(px+17,py+10,3,11);ctx.fillRect(px+13,py+14,11,3);
  ctx.fillStyle='#922b21';ctx.beginPath();ctx.moveTo(px+18,py+6);ctx.lineTo(px+21,py+10);ctx.lineTo(px+15,py+10);ctx.closePath();ctx.fill();
}
function drawTowerArcher(px,py,upg){
  ctx.fillStyle=upg?'#2a6a4a':'#6d4c41';ctx.fillRect(px+11,py+20,18,18);
  ctx.fillStyle=upg?'#1a5a3a':'#5d4037';ctx.fillRect(px+9,py+12,22,12);
  ctx.fillStyle=upg?'#1a4a2a':'#4e342e';
  ctx.fillRect(px+9,py+7,6,9);ctx.fillRect(px+17,py+7,6,9);ctx.fillRect(px+25,py+7,6,9);
  ctx.fillStyle=upg?'#0e3a1e':'#3e2723';
  ctx.fillRect(px+11,py+7,4,6);ctx.fillRect(px+19,py+7,4,6);ctx.fillRect(px+27,py+7,4,6);
  ctx.fillStyle=upg?'#2a8a4a':'#795548';ctx.fillRect(px+9,py+35,22,4);
  if(upg){ctx.fillStyle='rgba(50,255,100,0.15)';ctx.fillRect(px+9,py+7,22,32);}
  const cx=px+20,cy=py+11;
  ctx.fillStyle='#d4a96e';ctx.beginPath();ctx.arc(cx,cy-5,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=upg?'#1a6a3a':'#4a4a4a';ctx.beginPath();ctx.arc(cx,cy-8,4,Math.PI,0);ctx.fill();
  ctx.fillStyle=upg?'#2a8a5a':'#546e7a';ctx.fillRect(cx-3.5,cy-2,7,6);
  ctx.strokeStyle='#5d4037';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx-7,cy-3);ctx.lineTo(cx-7,cy+4);ctx.stroke();
  ctx.strokeStyle=upg?'#aaffcc':'#e8d5b0';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(cx-7,cy-3);ctx.quadraticCurveTo(cx-1,cy+1,cx-7,cy+4);ctx.stroke();
}
function drawTowerCannon(px,py,upg){
  ctx.fillStyle=upg?'#5a3a1a':'#5a4a3a';ctx.fillRect(px+8,py+18,24,20);
  ctx.fillStyle=upg?'#8a5a28':'#7a6a58';ctx.fillRect(px+6,py+10,28,12);
  ctx.fillStyle=upg?'#6a3a10':'#6a5a48';ctx.fillRect(px+6,py+4,8,10);ctx.fillRect(px+18,py+4,8,10);
  ctx.fillStyle=upg?'#4a2800':'#5a4a38';ctx.fillRect(px+8,py+4,4,7);ctx.fillRect(px+20,py+4,4,7);
  ctx.fillStyle=upg?'#c87020':'#888';ctx.fillRect(px+16,py+14,8,5);
  ctx.fillStyle=upg?'#e08030':'#aaa';ctx.fillRect(px+23,py+15,6,3);
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(px+13,py+30,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(px+19,py+30,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(px+16,py+26,3,0,Math.PI*2);ctx.fill();
  if(upg){ctx.fillStyle='rgba(255,140,0,0.15)';ctx.fillRect(px+6,py+4,28,34);}
}
function drawTowerMage(px,py,upg){
  ctx.fillStyle=upg?'#3a1060':'#2a1a4a';ctx.fillRect(px+13,py+14,14,24);
  ctx.fillStyle=upg?'#4a1a80':'#3a2a5a';ctx.fillRect(px+9,py+30,22,10);
  ctx.fillStyle=upg?'#6a2aaa':'#4a3a7a';ctx.beginPath();ctx.moveTo(px+20,py+2);ctx.lineTo(px+28,py+14);ctx.lineTo(px+12,py+14);ctx.closePath();ctx.fill();
  ctx.fillStyle=upg?'#ffddff':'#8888ff';ctx.beginPath();ctx.arc(px+20,py+20,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=upg?'#ffaaff':'#aaaaff';
  const ns=upg?5:3;for(let i=0;i<ns;i++){const a=(i/ns)*Math.PI*2,r=upg?9:7;ctx.beginPath();ctx.arc(px+20+Math.cos(a)*r,py+22+Math.sin(a)*r,1.5,0,Math.PI*2);ctx.fill();}
  if(upg){ctx.strokeStyle='rgba(200,100,255,0.4)';ctx.lineWidth=1;ctx.beginPath();ctx.arc(px+20,py+22,11,0,Math.PI*2);ctx.stroke();}
}
function drawTower(tw){
  const px=tw.x*GS,py=tw.y*GS;
  if(tw.type==='archer')drawTowerArcher(px,py,tw.upgraded);
  else if(tw.type==='cannon')drawTowerCannon(px,py,tw.upgraded);
  else drawTowerMage(px,py,tw.upgraded);
  if(selectedTower===tw){
    ctx.strokeStyle=TOWER_DEFS[tw.type].color;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.arc(px+GS/2,py+GS/2,tw.range,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(px+1,py+1,GS-2,GS-2);
  }
}
function drawEnemy(en){
  const px=en.x*GS+GS/2,py=en.y*GS+GS/2;
  const isHeavy=en.type==='heavy',S=isHeavy?0.75:0.52;
  const ls=Math.sin(Date.now()/130)*4;
  ctx.save();ctx.translate(px,py);ctx.scale(S,S);
  if(isHeavy){
    ctx.fillStyle='#4a0000';ctx.save();ctx.translate(-4,10);ctx.rotate(ls*Math.PI/180);ctx.fillRect(-3,0,6,11);ctx.fillStyle='#220000';ctx.fillRect(-3,10,6,4);ctx.restore();
    ctx.save();ctx.translate(4,10);ctx.rotate(-ls*Math.PI/180);ctx.fillStyle='#4a0000';ctx.fillRect(-3,0,6,11);ctx.fillStyle='#220000';ctx.fillRect(-3,10,6,4);ctx.restore();
    ctx.fillStyle='#660000';ctx.save();ctx.translate(-8,0);ctx.rotate(-ls*Math.PI/180*0.6);ctx.fillRect(-2,-2,4,10);ctx.restore();
    ctx.save();ctx.translate(8,0);ctx.rotate(ls*Math.PI/180*0.6);ctx.fillRect(-2,-2,4,10);ctx.restore();
    ctx.fillStyle='#8a0000';ctx.fillRect(-12,-4,5,10);ctx.fillStyle='#cc0000';ctx.fillRect(-11,-3,3,8);ctx.fillStyle='#ffcc00';ctx.fillRect(-10,0,1,2);
    ctx.fillStyle='#550000';ctx.fillRect(-7,-10,14,18);ctx.fillStyle='#880000';ctx.fillRect(-6,-9,12,16);
    ctx.fillStyle='rgba(255,0,0,0.1)';ctx.fillRect(-6,-9,12,7);
    ctx.fillStyle='#770000';ctx.fillRect(-10,-10,6,6);ctx.fillRect(4,-10,6,6);ctx.fillStyle='#aa0000';ctx.fillRect(-9,-9,4,4);ctx.fillRect(5,-9,4,4);
    ctx.fillStyle='#222';ctx.fillRect(-7,6,14,3);ctx.fillStyle='#888';for(let si=0;si<3;si++)ctx.fillRect(-5+si*4,6,2,3);
    ctx.fillStyle='#c08060';ctx.fillRect(-2,-12,4,4);ctx.beginPath();ctx.arc(0,-17,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#660000';ctx.beginPath();ctx.arc(0,-20,7,Math.PI,0);ctx.fill();ctx.fillStyle='#880000';ctx.fillRect(-7,-20,14,5);
    ctx.fillStyle='#550000';ctx.fillRect(-5,-17,10,5);ctx.fillStyle='#ff2200';ctx.fillRect(-4,-16,3,1.5);ctx.fillRect(1,-16,3,1.5);
    ctx.fillStyle='#333';ctx.beginPath();ctx.moveTo(-7,-22);ctx.lineTo(-5,-30);ctx.lineTo(-3,-22);ctx.fill();ctx.beginPath();ctx.moveTo(3,-22);ctx.lineTo(5,-30);ctx.lineTo(7,-22);ctx.fill();
    ctx.strokeStyle='#777';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(9,8);ctx.lineTo(14,-10);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.moveTo(13,-10);ctx.lineTo(18,-14);ctx.lineTo(17,-8);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(13,-10);ctx.lineTo(18,-6);ctx.lineTo(15,-4);ctx.closePath();ctx.fill();
  } else {
    ctx.fillStyle='#444';ctx.save();ctx.translate(-3,8);ctx.rotate(ls*Math.PI/180);ctx.fillRect(-2,0,4,9);ctx.fillStyle='#222';ctx.fillRect(-2,8,4,3);ctx.restore();
    ctx.save();ctx.translate(3,8);ctx.rotate(-ls*Math.PI/180);ctx.fillStyle='#444';ctx.fillRect(-2,0,4,9);ctx.fillStyle='#222';ctx.fillRect(-2,8,4,3);ctx.restore();
    ctx.fillStyle='#6a6a6a';ctx.save();ctx.translate(-6,0);ctx.rotate(-ls*Math.PI/180*0.6);ctx.fillRect(-1.5,-1,3,8);ctx.restore();
    ctx.save();ctx.translate(6,0);ctx.rotate(ls*Math.PI/180*0.6);ctx.fillRect(-1.5,-1,3,8);ctx.restore();
    ctx.fillStyle='#666';ctx.fillRect(-5,-8,10,14);ctx.fillStyle=en.color;ctx.fillRect(-4,-7,8,12);
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-4,-7,8,5);ctx.fillStyle='#888';ctx.fillRect(-7,-8,4,4);ctx.fillRect(3,-8,4,4);
    ctx.fillStyle='#333';ctx.fillRect(-5,4,10,2);ctx.fillStyle='#c9a070';ctx.fillRect(-2,-10,4,4);
    ctx.fillStyle='#d4a96e';ctx.beginPath();ctx.arc(0,-15,5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#555';ctx.beginPath();ctx.arc(0,-17,5.5,Math.PI,0);ctx.fill();ctx.fillStyle='#444';ctx.fillRect(-5.5,-17,11,3);
    ctx.fillStyle='#333';ctx.fillRect(-4,-15,8,1.5);ctx.fillStyle='#4a4a4a';ctx.fillRect(-5.5,-17,2.5,6);ctx.fillRect(3,-17,2.5,6);
    ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(7,2);ctx.lineTo(12,-8);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.beginPath();ctx.moveTo(12,-8);ctx.lineTo(10.5,-11);ctx.lineTo(13.5,-11);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#5d4037';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(9.5,-2);ctx.lineTo(14,-2);ctx.stroke();
  }
  ctx.restore();
  const hw=isHeavy?20:14,barY=py-(isHeavy?24:17);
  ctx.fillStyle='#222';rrect(px-hw/2-1,barY,hw+2,4,2);ctx.fill();
  ctx.fillStyle=en.hp/en.maxHp>0.5?'#27ae60':'#e74c3c';rrect(px-hw/2,barY+1,Math.round(hw*(en.hp/en.maxHp)),3,1);ctx.fill();
}
function drawProjectile(a){
  ctx.save();ctx.translate(a.x,a.y);ctx.rotate(a.angle);
  if(a.type==='cannon'){ctx.fillStyle='#333';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#555';ctx.beginPath();ctx.arc(-1,-1,2,0,Math.PI*2);ctx.fill();}
  else if(a.type==='mage'){ctx.fillStyle='#cc44ff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(180,0,255,0.4)';ctx.beginPath();ctx.arc(0,0,7,0,Math.PI*2);ctx.fill();}
  else{ctx.strokeStyle='#8B4513';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(5,0);ctx.stroke();ctx.fillStyle='#607d8b';ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(3,-2);ctx.lineTo(3,2);ctx.closePath();ctx.fill();ctx.fillStyle='#a5d6a7';ctx.beginPath();ctx.moveTo(-7,0);ctx.lineTo(-5,-2);ctx.lineTo(-4,0);ctx.lineTo(-5,2);ctx.closePath();ctx.fill();}
  ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,600,620);ctx.fillStyle='#388e3c';ctx.fillRect(0,0,600,620);
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    const t=terrain[y][x],px=x*GS,py=y*GS;
    ctx.fillStyle=(x+y)%2===0?'#43a047':'#3d9142';ctx.fillRect(px,py,GS,GS);
    if(t===1)drawBush(px,py);if(t===2)drawTree(px,py);if(t===3)drawRock(px,py);
  }
  if(buildMode){
    for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
      if(terrain[y][x]===0&&grid[y][x]===null&&!(x===CX&&y===CY)){
        ctx.fillStyle='rgba(100,220,100,0.28)';ctx.fillRect(x*GS+1,y*GS+1,GS-2,GS-2);
        ctx.strokeStyle='rgba(100,255,100,0.7)';ctx.lineWidth=1.5;ctx.strokeRect(x*GS+1,y*GS+1,GS-2,GS-2);
      }
    }
  }
  drawCastle(CX*GS,CY*GS);towers.forEach(t=>drawTower(t));
  explosions.forEach(ex=>{ctx.globalAlpha=ex.life/20*0.45;ctx.fillStyle=ex.type==='mage'?'#aa44ff':'#e67e22';ctx.beginPath();ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
  enemies.forEach(en=>drawEnemy(en));arrows.forEach(a=>drawProjectile(a));
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/30);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,2,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  if(popup){
    const label=popup.type===2?'Baum entfernen (40 Gold)':'Busch entfernen (20 Gold)';
    const{bx,by}=popup;ctx.fillStyle='rgba(0,0,0,0.88)';rrect(bx-1,by-1,194,42,7);ctx.fill();
    ctx.fillStyle='#c0392b';rrect(bx,by,192,40,6);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.fillText(label,bx+12,by+25);
  }
  if(msgTimer>0){ctx.fillStyle='rgba(0,0,0,0.78)';rrect(100,558,400,34,6);ctx.fill();ctx.fillStyle='#f1c40f';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText(msg,300,580);ctx.textAlign='left';}
  if(gameOver){
    ctx.fillStyle='rgba(0,0,0,0.85)';ctx.fillRect(0,0,600,620);ctx.fillStyle='#e74c3c';ctx.font='bold 36px sans-serif';ctx.textAlign='center';ctx.fillText('GAME OVER',300,270);
    ctx.fillStyle='#ccc';ctx.font='18px sans-serif';ctx.fillText('Welle '+wave+' erreicht',300,310);
    ctx.fillStyle='#922b21';rrect(150,328,300,50,8);ctx.fill();ctx.fillStyle='#e74c3c';rrect(151,329,298,48,7);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.fillText('Neu starten',300,359);ctx.textAlign='left';
  }
}
function loop(){update();draw();requestAnimationFrame(loop);}
updateUI();loop();
</script>
</body>
</html>
