<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>LGame</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    color: white;

    background: linear-gradient(180deg, #0a0f2c, #050814);
}

/* HEADER */
header {
    background: transparent;
    color: white;
    padding: 20px;
    text-align: center;
}

/* TITEL */
h1 {
    font-size: 64px;
    margin: 10px 0;
    letter-spacing: 2px;
}

/* CONTENT ABSTAND (HIER IST DER FIX) */
#content {
    margin-top: 90px;
}

/* BUTTONS CONTAINER */
#menuButtons {
    margin-top: 15px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
}

button {
    padding: 20px 28px;   /* 🔥 macht die Buttons höher */
    cursor: pointer;
    border: none;
    border-radius: 16px;

    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: white;
    font-weight: bold;
    font-size: 18px;

    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
    transition: all 0.2s ease;
}

/* GAME AREA */
.game {
    display: none;
    animation: fadeIn 0.3s ease;
    position: relative;
}

.game.active {
    display: block;
}

/* BACK BUTTON */
.backBtn {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.6);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
}

/* GAME BOX */
canvas, iframe {
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<header>
    <h1>🎮 LGame 🎮</h1>

    <div id="menuButtons">
        <button onclick="showGame('menu')">Snake 🐍</button>
        <button onclick="showGame('flappy')">Flappybird 🐦</button>
        <button onclick="showGame('nova')">Nova Blaster 🚀</button>
        <button onclick="showGame('tetris')">Tetris</button>
    </div>
</header>

<!-- CONTENT WRAPPER -->
<div id="content">

    <!-- MENU -->
    <div id="menu" class="game active">
        <h2>Willkommen!</h2>
        <p>Wähle ein Spiel oben aus 🎯</p>
    </div>

    <!-- SNAKE -->
    <div id="snake" class="game">
        <button class="backBtn" onclick="showGame('menu')">⬅ Zurück</button>
        <h2>🐍 Snake</h2>
        <iframe src="snake.html" width="600" height="500"></iframe>
    </div>

    <!-- FLAPPY -->
    <div id="flappy" class="game">
        <button class="backBtn" onclick="showGame('menu')">⬅ Zurück</button>
        <h2>🐦 Flappy Bird</h2>
        <iframe src="flappybird.html" width="420" height="640"></iframe>
    </div>

    <!-- NOVA -->
    <div id="nova" class="game">
        <button class="backBtn" onclick="showGame('menu')">⬅ Zurück</button>
        <h2>🚀 Nova Blaster</h2>
        <iframe src="novablaster.html" width="600" height="600"></iframe>
    </div>

    <!-- TETRIS -->
    <div id="tetris" class="game">
        <button class="backBtn" onclick="showGame('menu')">⬅ Zurück</button>
        <h2>Tetris</h2>
        <iframe src="tetris.html" width="420" height="550"></iframe>
    </div>

</div>

<script>
function showGame(id) {
    document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if (id === "menu") {
        document.getElementById("menuButtons").style.display = "flex";
    } else {
        document.getElementById("menuButtons").style.display = "none";
    }
}

document.addEventListener("keydown", function(e) {
    const keys = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"];
    if (keys.includes(e.key)) {
        e.preventDefault();
    }
}, true);
</script>

</body>
</html>
