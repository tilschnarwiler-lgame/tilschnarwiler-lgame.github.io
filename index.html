<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>LGame</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    height: 100vh;
    overflow: hidden;

    /* cooler Gaming-Background */
    background: radial-gradient(circle at top, #1b1f3a, #0b0f1f);
    color: white;
}

/* HEADER */
header {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    color: white;
    padding: 15px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* BUTTONS */
button {
    padding: 10px 16px;
    cursor: pointer;
    border: none;
    border-radius: 12px;

    background: linear-gradient(135deg, #007bff, #00c6ff);
    color: white;
    font-weight: bold;

    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

button:active {
    transform: scale(0.95);
}

/* GAME AREA */
.game {
    display: none;
    margin-top: 20px;
    animation: fadeIn 0.3s ease;
}

.active {
    display: block;
}

/* CANVAS / GAME BOX */
canvas, iframe {
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* MENU TEXT */
#menu {
    margin-top: 80px;
    font-size: 20px;
    opacity: 0.9;
}

/* FADE ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<header>
<h1>🎮 LGame 🎮</h1>

<button onclick="showGame('menu')">Start</button>
<button onclick="showGame('snake')">Snake 🐍</button>
<button onclick="showGame('flappy')">Flappybird 🐦</button>
<button onclick="showGame('nova')">Nova Blaster 🚀</button>
<button onclick="showGame('tetris')">Tetris</button>
       
</header>

<!-- MENÜ -->
<div id="menu" class="game active">
    <h2>Willkommen!</h2>
    <p>Wähle ein Spiel oben aus 🎯</p>
</div>



<!-- SNAKE SPIEL -->
<div id="snake" class="game">
<h2>🐍 Snake</h2>

<iframe 
src="snake.html"
width="600"
height="500"
style="border:none;">
</iframe>

</div>

<!-- FLAPPY -->
<div id="flappy" class="game">
<h2>🐦 Flappy Bird</h2>

<iframe
src="flappybird.html"
width="420"
height="640"
style="border:none;">
</iframe>

</div>

<!-- NOVA BLASTER -->
<div id="nova" class="game">
<h2>🚀 Nova Blaster</h2>

<iframe 
src="novablaster.html"
width="600"
height="600"
style="border:none;">
</iframe>

</div>


<!-- TETRIS -->
<div id="tetris" class="game">
<h2>Tetris</h2>

<iframe 
src="tetris.html"
width="420"
height="550"
style="border:none;">
</iframe>

</div>

    

<script>
// ---------------- MENU ----------------
let score = 0;
let secretNumber = Math.floor(Math.random() * 10) + 1;

function showGame(id) {
    document.querySelectorAll(".game").forEach(g => g.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if (id === "guess") {
        secretNumber = Math.floor(Math.random() * 10) + 1;
        document.getElementById("result").innerText = "";
    }

    if (id === "snake") {
        startSnake();
    }
}




// ---------------- SCROLLBLOCK ----------------

    
document.addEventListener("keydown", function(e) {
    const keys = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"];

    if (keys.includes(e.key)) {
        e.preventDefault();
    }
}, true);
    

    
    
</script>

</body>
</html>
